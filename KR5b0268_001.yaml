front:
  text: 太上靈寶淨明飛仙度人經法卷一
  hash: sha256:8067cb4f8b4656dc33e1d798e0805a2b630f64a3c1ccd7482e27a89109a7d98d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_HFL_001-001a, image: hfl/0316/0316-022.png}
body:
  text: 髙明大使神功妙濟真君許旌陽釋敘微言其道包含所以彰微者此也終而釋之謂之釋例所謂敘微者以明例象天啓運章第一道言昔於始青天中碧落空歌大浮黎土受元始度人無量上品師曰此道君敘受法之初用為看法之呪符右面東再拜燒香搯子勒至辰書符一道次念碧落空歌呪符左手搯午歌曰妙哉元始道大梵敷真文上開龍漢劫煥爛光彩分三十二天書五老赤字傳垂慈度生死鬱勃吐祥雲中有長命訣植芽鍊飛仙開函發玄奧稽首生精勤仰思髙靈降乘氣歸三清真應章第二元始天尊當説是經周回十過以召十方始當詣座天真大神上聖髙尊妙行真人無鞅數衆乘空而來飛雲丹霄緑輿瓊輪羽蓋垂蔭流精玉光五色鬱勃洞煥太空七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色衆真侍座元始天尊玄座空浮五色獅子之上師曰此道君受法之初衆真皆會此時始有淨明二篇靈書明王因之造法著經用之淨身看法文時存思呪右弟子看法文淨身了未開法文時再拜以兩手搯中指上節閉息良久瞑目定觀念呪見衆真皆會再拜放訣看法文念呪時先云我聞元始天尊至獅子之上則又曰弟子慶幸今日願受度識神章第三祖師太陽上帝孝道仙王靈寶淨明天尊祖師太隂元君孝道明王靈寶淨明黃素天尊經師至孝恭順仙王籍師玄都御史真君監度師三天扶教輔元大法天師正一沖玄靜應真君度師九州都仙太史髙明大使至道玄應神功妙濟真君靈寶淨明玄中傳教聖師靈寶淨明下教仙卿靈寶淨明飛天度人大元帥帝君靈寶淨明飛天度人大使者帝君靈寶淨明飛天度人三十六位帝君靈寶淨明飛天度人十方神王靈寶淨明飛天度人三百六十萬神王靈寶淨明飛天度人十方長生大神靈寶淨明飛天度人三部袐法羽衣謄籍判官靈寶淨明飛天度人繡衣玉童玉女靈寶淨明飛天度人侍經五帝直符靈寶淨明飛天度人侍經五氣功曹靈寶淨明飛天度人周天傳言傳香傳文典籍使靈寶淨明飛天度人護身傳真衛真監真吏靈寶淨明飛天度人前後二十四史吏靈寶淨明飛天度人直事傳言飛龍騎吏靈寶淨明飛天度人八萬四千靈官寨主將靈寶淨明飛天度人八萬四千寨節貟甲馬靈寶淨明飛天度人八萬四千受事靈寶淨明飛天度人三界直符靈寶淨明飛天度人怛他蘇伽功曹師曰此靈寶一切法中行事之神冝於每日遂燒香朝禮行持法具于後每日子時起燒香存法院向西法師向東立垂兩手搯寅叩齒三十六通放訣收手一拜如見日光圓數丈直照面又兩拜叩齒九通呪曰道香德香無為清淨香靈寶淨明香供養靈寶淨明尊六位都法主一切靈寶君帝君及天君神王諸主宰願我所行法速得遂我心上報君父母下救衆生苦真氣常滿體役使諸萬靈萬靈盡歸依急急如律令呪畢吸太陽一口吞凡遇每月朔望即子時出庭下搯寅叩齒三十六通存想十方無極飛天神王侍立四方青龍白虎朱雀玄武衛身放訣收手心拜三過叩齒三通後呪道香德香無為清淨香靈寶淨明香供養太上三境尊八極諸天帝淨明靈寶上聖三界五帝大魔七政五斗諸星辰十方無極無量品神王官將一切威靈今日欣慶修行至經惟願安鎮國家濟度天人九祖升遷萬神侍衛稽首歸依無極大道又叩齒三通咽液三過再拜二過師曰於此述識神章一者所以敘行道受法之人上真護衛貴在崇奉逐日清旦行香誦持知其衣服儀衛之像存念不失於生時因奉至道名受遙勳字載玄譜神澄氣徹日作真遊死則正入仙階身厠三十六位靈寶真人之下夫為靈寶真人者即天真大神妙行真人之果也如玄中傳教聖師者如今日淨明設教則有玄中大法師等降汝身中輔汝心性使自達曉故開一位洞神下教仙卿者汝等開度人使忠孝之道淨明之説行之不失有益生齒必證此位令洞府神仙管攝之昭應章第四説經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰説經二遍盲者目明説經三遍喑者能言説經四遍跛痾積逮皆能起行説經五遍久病痼疾一時復形説經六遍髮白返黑齒落更生説經七遍老者返壯少者皆強説經八遍婦人懷娠鳥獸含胎巳生未生皆得生成説經九遍地藏發泄金玉露形説經十遍枯骨更生皆起成人是時一國是男是女莫不心皆受護度咸得長生師曰此道君受法之初有此昭應用為普召十方真文有天篆書文一百五十二字凡奏章等醮儀皆須用此請召十方其文青紙朱書吸五方氣各一口念靈書上下品及中篇一遍閉氣以左手搯本師訣卯文書之先具書云臣某聞昔時天尊始篆説經一遍至畢咸得長生又書云今日欣慶修齋願得受度書訖以白茅向東方念呪燒之呪下一假經自道言至一時同至乃再拜曰弟子今日欣慶修齋伏願十方三界衆真下降臨軒急急如律令定須細想聖真自空而來召神呪道言是時元始天尊説經一遍東方無極無量品至真大神無鞅之衆浮空而至説經二遍南方無極無量品至真大神無鞅之衆浮空而至説經三遍西方無極無量品至真大神無鞅之衆浮空而至説經四遍北方無極無量品至真大神無鞅之衆浮空而至説經五遍東北無極無量品至真大神無鞅之衆浮空而至説經六遍東南無極無量品至真大神無鞅之衆浮空而至説經七遍西南無極無量品至真大神無鞅之衆浮空而至説經八遍西北無極無量品至真大神無鞅之衆浮空而至説經九遍上方無極無量品至真大神無鞅之衆浮空而至説經十遍下方無極無量品至真大神無鞅之衆浮空而至十遍周竟十方無極天真大神一時同至師曰此道君受法之初諸天皆至用為燒真文呪洞界章第五一國男女傾心歸仰來者有如細雨密霧無鞅之衆迮國一半土皆偏陷非可禁止於是元始天尊懸一寶珠大如黍米在空玄之中去地五丈元始登引天真大神上聖髙尊妙行真人十方無極至真大神無鞅數衆俱入寶珠之中天人仰看唯見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷元始即於寶珠之內説經都竟衆真監度以授於我當此之時喜慶難言法事粗悉諸天復位倐忽之間寂無遺響師曰此天尊説經之時有此變化用為法師呪黍米隱身存神拘魂制魄之術右取黍米一升選天德月德日北向左手搯本師訣卯文右手斗訣先啓白六師真師北斗真君取北斗紫氣七口念呪曰吾聞元始天尊度人無量説經既周一國男女至寂無遺響吾今呪此黍米隱身存神拘魂制魄變化莫測運度無邊急急如太上勑次吹氣入黍米放淨合內供養每日存思吞服存思法每日早晨入靖吞淨明寶籙了取黍米一百二十粒入室靜坐存泥丸中有青氣心中有白氣臍中有黃氣三氣俱生如雲覆身因變成大火燒身身色洞徹內外良久乃止於是以黍米就服氣以鼻引青氣一百二十行咽之止次以水吞米護身章第六是時天人遇值經法普得濟度全其本年無有中傷傾土歸仰咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不嫉言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平經始出教一國以道預有至心崇奉禮敬皆得度世師曰此元始天尊為道君説經之際天人遇值經法皆生此道心為法師護身呪右每以本命生受胎日於寅上步罡七遍念此呪即一切鬼神姦人詭賊欲見害者皆自消散十方善人皆來欽重如要見貴人即隔日步罡而後往步罡時存身為道君手執道君玉印右取受胎日法謂如甲子月生以乙卯為受胎月戊辰日生戊與癸合辰與酉合癸酉日受胎日於前戊辰日內尋不前則後每年於此日作用不拘南斗諱五行水火木金土已上自取三步丁罡入魁至魒右步水至金右足起步南斗從尾至頭入斗中以左挑北斗蓋頭自斗反身出再丁罡步入北斗凡七遍止思變為七身七身如一傳受章第七道言元始天尊説經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也非世上之常辭上聖巳成真人通玄究微能悉其章誦之十過諸天遙唱萬帝設禮河海靜默山嶽藏雲日月停景璇璣不行群魔束形鬼精滅爽回尸起死白骨成人至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生所以爾者學士穢氣未消體未洞真召至十方威未制天政德可伏御地祇束縛魔靈但却死而已不能更生輕誦此章身則被殃供養尊禮門戶興隆世世昌熾與善因緣萬災不干神明護門斯經尊妙獨步玉京度人無量為萬道之宗巍巍大範德難可勝師曰此是道君授經與靈寶淨明天尊之時元始所説尊妙如是永為傳度之先言右自道言元始天尊説經中所言至德難可勝續之曰吾今得此袐法以度汝汝冝克心勉勵愼守科戒説戒具科目章第八道言凡誦是經十過諸天齊到億曽萬祖幽魂苦爽皆即受度上升朱宫格皆九年受化更生得為貴人而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也師曰此是道君授經於靈寶淨明天尊之時具説此經有薦拔祖考超出幽夜之功用於説戒之後云此乃為弟子燒草人劵追資億劫種親右自道言凡誦是經至玉京也續云吾今授汝袐法為汝奉依明科薦拔先亡億劫眷屬汝得法之後切兾榮華敷揚教風上報道君之恩乃為弟子存念燒草人事見本章具載上學之士修誦是經皆即受度飛升南宮世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得返形遊行太空此經微妙普度無窮一切天人莫不受度無量之福生死蒙惠師曰此是道君傳經與靈寶淨明天尊之時受記保舉之詞於拔度弟子先祖魂魄之後再伸此言加補弟子仙職出給文牒右燒草人文劵了師就坐説上文目上學之士至生死蒙惠續云吾今授汝袐法説超汝玄祖今更依科祈叩上聖髙尊保舉汝姓名書注玄譜遙補仙階汝愼無忽所有度補劄牒文付弟子乃以下文勑勵神將度印上天所寶不傳下士至士齎金寶效心盟天而傳輕泄漏慢殃及九祖長役鬼官侍經五帝玉童玉女各二十四人營衛神文保護受經者身師曰此是道君授經之時差玉童玉女護度弟子因作是語今為定格右補職弟子了念上天所寶至受經者身續云凡受仙官必有將佐汝冝修檢次念勑勵官將呪勑曰洞神有約元帥帝君司惡司善史吏精勤玉童玉女保衛侍經一切佐治不得違盟右以左手搯中指玉皇文一發而出面中山取氣一口吹弟子次付法書劒印付弟子畢再念下文道言正月長齋誦詠是經為上世亡魂斷地逮役度上南宮七月長齋誦詠是經身得神仙諸天書名黃籙白簡削死上生十月長齋誦詠是經與國王帝主君臣父子安鎮國祚保天長存世世不絶常為人君安鎮其方民稱太平八節之日誦詠是經得為九宫真人本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清師曰此是道君傳度之後重伸勸戒靈寶淨明天尊之詞謝恩畢以示叮嚀委曲之意師曰凡傳度隨力建醮行科三獻宣詞訖就六位前左設香案坐法師存神戴逺遊冠衣絳綾文袍青巾單皂襈赤舄衣朱裳手執玉圭銅佩如洞神下教仙卿先拜祖師衆真畢就傍立為弟子説戒弟子各長跪法師先祝香皈依三寶為君王師資禱福次自道言元始天尊説經中所言至德難可勝吾今得此袐法用以度汝等汝等冝克心勉勵愼守戒科弟子遵聽法師就坐演説十戒一者無忘八極忠者欽之極孝者順之極廉者清之極謹者戒之極寬者廣之極裕者樂之極容者和之極忍者智之極天以斗為極地以嶽為極天以有極則能聚衆氣地以有極則能聚衆形屋以有極則能聚衆木人之有八極亦如是也故能集善善立則道備道備則所聞所見自然廓開所應所修自然順適此得靈寶淨明飛仙度人之基也二者無忘鑑水鑑者喻心水者喻性心明則萬法皆照性淨則五濁不歸道之在人圓通非蒙蔽可了非操動可達托鑑水而悟心性此得靈寶淨明飛仙之體也三者無忘日録日録者所以修檢善惡之處世患不能自知患不能聞不能聽言則無所益今以日録録日所為不可下筆處皆已非也改之為貴則日録者不教之師也不説之反也不詔之君父不約之法度不可忘之此得靈寶淨明飛仙之相也四者無忘追度安鎮人之所親不過父母所尊不過君王上知君王父祖之德而思必報者追度安鎮是也追者謂誦經行符上為父祖六親之過去者以資冥路度者謂誦經行符上為父祖六親之存者以資福算安鎮者謂誦經行符上祝國王帝主聖壽安鎮四方召龍行雨驅妖馘毒保護民物禳度星辰皆其一也或在家行祖父之志在官分君主之職種種利益有可報稱皆即為之凡本之葉落尚自糞其本根復命之義也人之報本不可不勉此得靈寶淨明飛仙度人之冝也五者無忘救治救治之術慈憫為先凡有病者為其誦經行符至誠禳却如己父母男女凡有方便種種惠澤皆盡其心只如蒞官行法務布隂功寬平設法思久而有弊三省而行智勇用兵思進而有敗三省而動其或修治橋梁當塗種植有益於世者皆力行之夫人之有慈念如木之有本根人而不仁不逮於禽獸故昔有猩猩活象義鶻搏蛇救難除害有如此者可不思之此得靈寶淨明飛仙度人之由也六者無忘服煉服煉之術參同天地效法隂陽念念正真存存不缺則自然超脫變化無方今之蟲豸有能捨陸走而至飛翔脫川遊而遂奔逸在物既爾人胡不然此得靈寶淨明飛仙度人之方也七者無忘剛潔剛則有守而不行非淫潔則戒汚而不慕非食不淫則不損身之精神戒食則不殺物之性命見人妻女如已尊親見物性命如己所生自然精神全而𡨚對少此得靈寶淨明飛仙度人之實也八者無忘儉約凡所衣服食用當知皆是元始祖氣化生灰水蕩穢不用修飾粟麥充飢不用珍庖此得靈寶淨明飛仙度人之福也九者無忘願約願者從初入道時發心約者自初入道後設誓天地神明司之無輒中變洞神有科不得不愼此得靈寶淨明飛仙度人之念也十者無忘師友師者所以教友者所以勸教汝者似父勸汝者似兄孰謂父兄而可不欽重而委棄乎此得靈寶淨明飛仙度人之宗也次明經中大略區貫七事載于釋例一明元始祖氣從何而生先化玉字而後發生造化二明生育混沌陶冶萬物三明靈寶大法自然生成圖書總括萬象為三才機紐含融於黃素之書要約於淨明三十五篇之奧詳悉於飛仙度人之寶法四明靈寶大法為三洞之祖教黃素則蓄其造化淨明則著其關鍵飛仙度人寶法貫而詳通發指樞戶者也五明人生體法元始造立混沌聖胎法身六明元始祖氣無形之先作何比擬降氣成質是生萬寶今世作何體狀採煉此氣以為寶餌之登真七明得此法者上則白日登升次則長生度世或得尸解之道務在觀心無心乃是真心觀形無形乃是真形心形都無目入無形則太定神光湛然見玉清境乃白日上升法也弟子再拜復跪法師重伸戒言自道言凡誦是經十過至玉京也吾既授法於汝今再為汝等奉依明科薦拔先亡至上報大道之恩弟子再拜起身序立法師依法宣讀歷關諸天元姑符命等文次存思燒草人符劵事見拔亡傳度章燒訖次法師復位弟子再拜謝跪法師重伸戒言自上學之士至飛升上清見傅度章次法師同弟子起謝醮會髙真依儀送神法事師曰於此出科品二章以明入道之儀職品章第九師曰凡受飛仙度人寶法者夙名玄譜巳注仙籍依科補職序其髙下隨功計遷以證將來入道之果故於此立職品師曰凡授飛仙度人寶法隂注陽報入職有三等一曰入天樞局一曰太玄都省局又有洞神堂今依三等渾其髙下為弟子考課遀其慶源福基深淺敘次一初地學法與入天樞職制一中地學法與入太玄都省職制一上地學法與洞神堂三景諸天職制以上三等隨受法深淺入局師曰凡三等職制之外有階階者由仙佐至真公之仙階凡八等功力顯著者入褒榮袐格凡三等四字以至二字師曰職有文武二等在天樞院曰文武職在太玄曰文林武林在洞神曰文郎武郎凡有不識字未通儒典義意未知唯慕道者入武林師曰天樞為常選太玄為童選洞神三景諸天為密選凡以此分三等重選壓常選其預密而階仙佐者壓重選常選內洞神乃三洞之要地一曰洞神一曰洞玄一曰洞真皆有堂而洞玄洞真自非位在天帝無因入此堂也而洞神者赤明開圖之時天仙之所貴官卑而地要三景之職而非洞神之職者在洞神之下巳上並出天樞太玄二都録須知及洞神都總職制律今存思章第十道言行道之日皆當香湯沐浴入淨室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞映室內項生圓象光映十方如此分明密呪曰貪羅鬱羅符無蘇陀太沖太極隂陽包和出有入無入生出死鬼神莫測變化自然元始混氣玄中之玄上干有終下洞大淵誦之一遍沈痾自痊錬魂浴魄真陽自全齋戒禮誦萬過飛仙無上袐呪受命綿綿重宣心呪貪羅洞明玉清上極梵氣氤氲分靈布氣降汪付身形神俱妙與道合真臣身得道七祖飛升一如金格統攝萬靈急急如元始玄都律令無上玄元太上道君召出臣身中三五功曹左右使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言今日吉慶長齋清堂修行至經無量度人轉經受生願所啓上徹徑御無上三十二天元始上帝至尊几前引氣三十二過東向師曰此諸靈寶真人誦經存思之法凡行只念度人本章以崇修功德者永作定制太上靈寶淨明飛仙度人經法卷一
