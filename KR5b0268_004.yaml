front:
  text: 太上靈寶淨明飛仙度人經法卷四髮四
  hash: sha256:09a81e1d3270513439db56dead2eb700af053fef66a16870fd5d351d3213b2aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_HFL_004-001a, image: hfl/0317/0317-004.png}
body:
  text: 髙明大使神功妙濟真君許旌陽釋龍䇿章第一師曰受學道士佩此靈文施於神呪以䇿文指天則天神下降指地則地祇朝禮三界束帶指神神敬指鬼鬼臧指水水神通道大劫交運洪災四㑹以䇿召龍龍為護身長修善事精誠通達則神靈交㑹所在施召舉向立到千變萬竒適意所從出入行藏位推太極前道飛龍後從鈞天鳳嘯鸞鳴十二華光建九色之節命靈之幡精思九年天儀自備常朱書三天太上召伏蛟龍虎豹山精文著一板上又書記年月師姓名著一板上合二板內囊裹又朱書次文著一板上凡二板合封為神䇿如簿之狀板悉用銀木為之長一尺四寸廣二寸四分以絳紋之繒作囊合長二尺四寸衣之封外又上下封以元始五老之章內板格外板次文洛題內外板文以本師諱字及年月日題之具本貫法位弟子本命年若于謹以某氣天中請到太上靈寶八威䇿文三牒文太上所傳黃帝合封為䇿以出仰之式右每用即先告白次念呪呪畢叩齒九通仰天三肅引天氣三咽以䇿之指所告之地閉氣九息而止呪曰元始太真五靈髙尊太華皓映洞朗八門五老告命無幽不聞上御九天中制鄷山下鎮河海十二水源八威神呪靈䇿玉文召龍負水收氣聚雲束魔送鬼掃蕩妖群萬精榷落所誅無蠲日月五星北斗七元諸天諸地諸水諸山五真所部溟泠大神仙王遊宴五帝仗幡天丁前驅金虎後奔钁天猛獸羅備四門所呼立到所召立前赤書煥落風火無停有所攝驗金龍驛傳師曰靈圖赤書玉訣龍䇿曰章並略叙赤明開圖至萬範開張一篇所載皆赤書煥發開落為用以濟合生之一二其有多門未能悉記學者通於一而萬事畢矣宜在乎多如能精專何施不可儻一一求之雖彈紙墨不足以盡為用多乎哉所謂萬範開張也元綱章第二元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元八景冥合氣入玄玄玄中太皇上帝髙真汛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真真中有神長生太君無英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上清出入華房入冥之內細微之中下鎮人身泥丸綘官中理五氣混合百神十轉回靈萬氣齊仙師曰元綱者升仙之要路天階之絶景道源既判神天居空洞之上非言可盡非見可聞悟其真者因真修真而外真自應矣識其妙者因妙得妙而外妙自應矣推神天之象則元綱之位其逺其近舉可知也人之有元氣開通骨䏞𩨨穴上達於頂一如天上元綱之路人之魂魄在身一如人在天中知出入則長生飛騰不知則庸愚之夫不學術業未知事官聮班之次而求見君也夫元氣融聚魂魄所飬爰有真精真精所本根於左腎右腎為命門在脊骨之窮其下有大骨骨中髓透尻骨其穴多龜尾其神為王毋面南而治事因帝所向而言謂之西龜之山道家托喻以為名也又謂之金闕以其居西也右謂為金闕左為玉房玉房言其玉在山而木潤居東方也又玉水之所本陽精之化精之所著名曰淨霐此元綱之氣根本所發之地寶圖之設髙壇起於此存三之說鬱羅蕭臺基於此臺之中尊直當於心所謂靈臺此上清之景也太清之上際則心之下也心之懸垂其下為肝肝之下二分北斗七星居之其氣達心其原上通舌下名曰涌泉其氣下達右腎腎之氣泄者以涌泉之氣不禁為交鋒交鋒者言斗之罡星大魒所照之地其性肅殺其神即欲界也如知道者以舌柱上腭直運其氣循脊而上以脊通頭頭者上清玉京之要路所謂西龜與玉京為鄰界者是今人不知便以為西龜在腦者有之然龜去玉清之氣四千萬里則其遼邈可知也心居中氣直達在天則火星最低氣先及也又心屬火命門之氣亦屬火言上達而相感天之日月與火星齊故日月參之人身則兩乳與心齊兩乳者兩眼之根原也人之二乳藏精以養目也故年老氣敗目昏則乳無根腎無精其斗在天之東北為天之關鍵艮之位也於人則右手肩井穴也人之氣脉以右為始天道行以西北為始由行西而至牛宿而天事畢人之氣自右手肩井至左手而人氣周天事雖畢而未可發生故造化於北起焉言重入火星也人氣雖一周而消息係焉言重入心中也由火木水金而行者天度也由心肝賢肺而行者氣腧背脊之穴也取脊穴而觀則上下左右見矣求其妙而推其喉環通頂門所以為玄玄之妙妙者言之不能盡不可指而名也無色之界在心之下空洞之處魁之左也後自斗口以舌柱上腭也舌柱上腭者名上天橋則超上清矣如此則玉清之景頭也太清之景丹田也上清之景絳宫也心為靈臺則靈寶之說可見矣於是而守守之在心於是而朝朝之在頭此三華離便而見大有之庭也故天中之天無英白元之㑹於心也自然成真則㑹於頭也修上道而至此則事畢矣不可得而容聲也故録為元罡飛步之法其有細微出在淨明法中今具罡圖于後師曰元罡之事參於身中則嘯咏洞章之說以經而論則云玄中太皇至自然成真住也究其義則玉清之景也玉清者天上之天也仰而視之則無上也俯而窺之則日月五星斗宿之神也三十二天之帝也言㑹而朝髙真太皇也太皇在洞房中三十二天羅布二十八宿環之日月五星侍立於前峩然大有之庭也以人身而求之天則頭者上天也兩眉間者太皇上帝髙真所居也泛景太霞者兩目中光也嘯咏洞章鼻口出入息也金真者鼻應金也流響雲營玉音攝氣者口鼻之息其響韻如此紫虛者眉也輔翼萬仙千和萬合者耳目鼻口不妄為出入有真人童子存馬其聲合乎天籟與洞章參言中正之和氣分以其音召和氣出為布氣呪水之呪師曰長生太君火之正星玄中太皇之氣也無英公子白元尊神是金木之神星太乙司命是水之尊號桃康合延是土之真帝以洞房仙法驗之世書之論不同今正本法椎窮得旨要之精者為洞房法呪水布氣法諸呪水布氣見玄中太皇身著上清衣手執青書坐師子座左有長生大君右有太乙司命亦衣上清衣執圭侍立其大如棗在兩眉間方闊一寸如亭殿金闕照耀有光如青紅琉璃照水中如布氣則存照病人念呪自玄中太皇起至自然成真住几九遍存思耳目口鼻中有仙樂洞章步虛之聲呪水時吹氣於水中九口布氣吹病人亦九口布氣未驗再存吹三次而止洞房修真法諸修真洞房者亦存三守一之要法也每日靜坐不拘時候存玄中太皇身著上清衣手執青圭坐師子上長生大君在左太乙司命在右無英在左白元在右桃康在左桃孩在右長生火也火傳厨不息故為長生心也太乙命門之神也故為司命無英肝神白元肺神桃康合延土神物入土則分析而生故其神有二此神居臍中臍為命之根土為五行之根今以為賢神則非也腎水也得土而和故存腎者亦思二桃也存之則次第存自本官出各衣上清金縷霞衣侍衛中尊太皇在眉間分明了然眉中一寸廣如宫殿微呪曰真中有神至萬氣齊仙住凡八十一遍一遍取氣一口又思已魂衣絳綾衣袍戴逺逰之冠朝見太皇髙尊與太皇髙尊相對坐衆真侍立如前復念前呪九遍咽津八十一過而止靈芽章第三師曰經自梵氣而分其言包含萬範皆明梵氣分布施生靈秀於是而知赤書之字結為五芽在天則為五帝之精在人則為五官之秀中理五氣者以其下鎮安於一人也故自修洞房行元綱布神氣而服五芽存思食生氣之法服五芽法師曰九氣青天三氣丹天中央黃天七氣素天五氣玄天各有五帝五靈之童東方青靈之童典青帝之書諱開陽長九寸青羽衣執青麾侍文左南方赤靈之童典赤帝之書諱丹珠長三寸赤羽衣執赤節侍文前中央黃靈之童典黃帝之書諱紅瑛長一寸二分黃羽衣執黃鉞侍文中央西方白靈之童典白帝之書諱明石長七寸素羽衣執白旗侍文右北方黑靈之童典黑帝之書諱玉滋長五寸黑羽衣執黑幢侍文後學者思此五童降巳身百日及佩真文百日其神居五藏之中為致五芽之精常以立春之日雞鳴入室東向九拜平坐叩齒九通思青帝字靈威長九寸冠青玉冠衣九氣青羽飛衣駕蒼龍玉輿建梟旗從甲乙始老之官九十萬人來降須㬰化生青氣如雲貫覆巳形從巳口直入下肝腑又思木星煥明在東方照已身便開目念呪九遍吞東方真文十二字又常以立夏日雞鳴入室幸向三拜平坐叩齒三通思赤帝字飄弩長二寸冠赤玉冠衣三氣丹羽飛衣駕丹龍王輿建釆旗從丙丁真老之官三十萬人來降須㬰化生赤氣如火貫䨱已形從己口入直下心腑又思火星煥明在南方照已身便開目念呪三遍吞南方真文十二字又常以二分二至四日雞鳴入室向王十二拜平坐叩齒十二通思黃帝字含樞紐長一尺二寸冠黃玉冠衣五色羽衣駕黃龍玉輿建黃旗從戊已元老之官十二萬人來降須㬰化生黃氣如雲覆巳身從已口入直下脾腑又思土星在天中照我身便開目念呪十二遍吞中央真文十六字常以立秋日雞鳴入室西向七拜平坐叩齒七通思白帝字曜魄寶長七寸冠白玉冠衣七氣白羽飛衣駕白龍玉輿建素旗從庚辛皇老之官七十萬人來降須㬰化生白氣如雲貫覆已身從已口入直下肺腑又思金星煥明在西方照已身便開目念呪七遍吞西方真文十二字又常以立冬日雞鳴入室北向五拜平坐叩齒五通思黑帝字隱侯局長五寸冠玄玉冠衣五氣玄羽飛衣駕黑龍玉輿建皂旗從壬癸玄老之官五十萬人來降須㬰化生黑氣如流星之光貫覆已形從巳口入直下賢腑又思水星煥明北方照履已身便開目念呪五通吞北方真文十二字東方呪曰九氣青天元始上精皇老尊神衣服羽青役御天官煥明歲星散輝流芳陶溉我形上餐明霞服引木精固養青芽保鎮朽齡肝腑充溢玉芝自生𢌞年億劫色及童嬰五氣和合天地長并南方呪曰三氣丹天朱宫靈童元始上老參駕赤龍丹羽飛衣錦被明光驅䇿靈官運導隂陽三氣吐輝溉我絳宫赤子但鎮錬芽飾容朝餐朱景玉芝滿充𢌞停劫年朽骸反童長齡天地水享無窮身生水火斷絶群凶中央呪曰中黃太山元氣徘徊上有皇老總統四垂參駕黃龍五色羽衣運導九天輪轉璇璣煥明七星流光散輝玉英芳芝充溢四飛陶溉我身脾臃先開養芽餐精萬神總歸檢魂制魄仙錬八威表裏洞明長生不哀通真達靈升入玄微西方呪曰金靈七門皓映西華中有素皇元始之家參駕白龍七氣峩峩徘徊玉門散精朱霞金星吐輝芳芝𩃎𩃱玄奧我身飬我素芽明石鮮光萬劫不俱服以流泉餐以太和九天上帝給以玉華保年駐顔白景敷羅長存天地三光同遐北方呪曰北方玄天五氣散靈上有大神始老元精駕龍建旗逰宴上京是日元吉慶雲敷榮飛芝流灑滂沱四盈玉女玄奧溉我身形腎宫充鎮朽芽重生五府納真上通神明五老降接仙道早成變化水火衣服羽青飛行太空逰造紫庭壽同三景萬劫遐齡右呪畢各依方數咽津止便服字諸常服字則以雞鳴陽光始分東向叩齒如其方數摩兩掌拭面目如其方數念呪自東方起至北方終為一周東方青芽云服食青芽飲以朝華畢便以舌撩上齒之裏舐唇三過令玉泉滿口而咽之三過又引青氣九咽令鎮肝中南方朱丹云服食朱丹飲以池華以舌撩下齒表䑛唇漱口今玉芝滿口而三咽之又引赤氣三咽令鎮心中中央戊己昻昻太山服食精氣飲以醴泉畢以舌撩上齒取玉泉舐唇而三咽之又引黃氣十二咽令鎮脾中西方明石云服食明石飲以靈液畢以舌撩上齒漱口令玉芝滿口而三咽之又引白氣七咽令鎮肺中北方玄滋云服食玄滋飲以玉飴畢以舌撩下齒內䑛唇漱口滿而咽之又引黑氣五咽令鎮賢中右畢叩齒三十六通咽氣二十五過止又都呪曰白石巖巖以次行源泉通湧洞灌以玉漿飲之長生壽命益長畢以舌撩口上下中央令玉芝滿口而三咽之其道都畢東方真文南方真文中央真文西方真文北方真文玉飴仁濟章第四仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身身得受生上聞諸天諸天之上各有生門中有空洞謡歌之音魔王靈篇辭參髙真師曰此唾易修摩也其神常集於泥九之上在人頭常為人呼集魂魄真神有淪喪數未盡者皆救其名為法倧兄弟三人手執飛天法輪此是三天魔王之子也其靈篇之辭在後詳其義而為之洞章而唾易修摩符出淨明經也本章今别以為救世符禁之術第一欲界飛空之音人道渺渺仙道莽莽鬼道樂兮當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶師曰此歌音可以斷百邪凡人家素有妖魅未欲驅捉只令自北分散不為禍患則以此音治之搯酉文念呪七遍書符一道鎮之其怪永絶符文右件以五月五日造印之如有患狐魅即令帶之其鬼自去髙上清靈爽悲歌朗太空唯願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人算斷絶人命門阿人歌洞章以攝北羅鄷東送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆師曰此歌音可以驅捉邪魅凡人家有精怪作禍遣之不去者以此音掐酉朱書真字一通付所差官將擒之其文先以引劄叙事用此粘連卷前或粘投詞前如有印文即掐訣印粘之真文玉篆第二色界魔王章落落髙張明氣四騫梵行諸天周回十方無量大神皆由我身師曰此歌音可以禳鎮凡人家宅不寧所謀不遂身命迍蹇可以用朱書符貼佩書時念此呪七遍又左手辰文符文我有洞章萬遍成仙仙道貴度鬼道相連天地眇莾穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩師曰此歌音可以解拔𡨚滯飛疰復連凡有此者以桐木書符念七遍手掐巽取東方氣一口吹之書畢却以再書寫此一假於其上四畔發出用朱書亦可佩帶令人和合所向如心也符文右書訖以字蓋之置於門上若解冢訟則釘墓側龍漢蕩蕩何能别真我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故為歌音師曰此歌音可以治顚邪凡心病不知所主者以此呪符五遍取午氣一口書符令患吞佩左右午文符文第三無色界魔王歌曰三界之上眇眇大羅上無色根雲層峩峩唯有元始浩劫之家部制我界統乘玄都有過我界身入玉虛我位上王匡御衆魔師曰此歌音可以佩帶百神稽首公私災患不及書符即用此呪之左手寅文呪三遍取東西二方氣各一口書訖朱寫文封之一邊寫一邊押字符文空中萬變穢氣紛葩保真者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何師曰此歌音乃遣鬼呪也凡有祖先為禍不可攝罪者以此音呪符一道燒之書符時再掐酉文符文此三界之上飛空之中魔王之音音參洞章誦之百遍名度南宫誦之千遍魔王保迎萬遍道備飛升太空過度三界位登仙公有聞靈音魔王敬形師曰此歌音真書以封前所燒之符封符如簡上書此文勑制地祇侍衛送迎拔出地戶五苦八難七祖升仙永離鬼官魂度朱陵受錬更生師曰此章可以救沉滯凡有幽魂則先燒遣鬼呪符次焚符追度之時其文當寫如歷關諸天關子叙事意凡為弟子追度則同歷關諸天同為之以黃紙墨寫符文符文太上靈寶淨明飛仙度人經法卷四
