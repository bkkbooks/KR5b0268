front:
  text: 太上靈寳淨明飛仙度人經法卷三髮三
  hash: sha256:866d05f90159e954f2526abeb5490d50663acba45d96f15771aebb85c7e0bad9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_SJB_003-100572c, image: sjb/10/100572c.png}
body:
  text: 髙明大使神功妙濟眞君許旌陽釋運化章第一普告無窮萬神咸聽三界五帝列言上清師曰此元始說經之次度弟子至歴關諸天其普告無窮萬神咸聽三界五帝列言上清今爲行遣呪凡有行遣事畢法師微呪曰普告無窮至列言上清存天地四方鬼神聽命奉行之隱化章第二元洞玉暦龍漢延康眇眇億刼混沌之中上無復色下無復淵風澤洞虚金剛乗天天上天下無幽無冥無形無影無極無窮溟涬大梵遼廓無光師曰此是天尊說元洞玉暦之始天地未立祖炁未分混沌之中本無幽冥無影窮極唯大梵之炁遼廓眇眇未有昭示無光至龍漢元年方始出書今本天尊之言以爲隱身呪凡隱化之道攝有形以歸無形合有數以入於無數无始而反終還淳而復朴滅念超寂故天神人鬼莫能見其微也其法存五臟之炁隨罡歩而生隨罡歩而滅念元洞玉暦至遼廓無光存身歸大梵之炁炁如雲煙覆身身與炁合自然隱也但君子之固窮自若小人得知輕命以爲變怪今略具而不傳愼之也罡圖靈圖章第三赤明開圖運度自然元始安鎭敷落五篇赤書玉字八威龍文保制劫運使天長存梵炁彌維萬梵開張師曰此是元始天尊叙祖炁化生玉字出書度人之次謹按恭華天梵形落空四字出於玉京山主天元開運變化之靈以此攷之則靈書中篇在開圖之𥘉謂之中者炁之和融而成書一生二二生三則靈書上下二品因之以生貫三爲一則黄素八十一字次之靈書二篇應於隂隂中有陽日宫孝道明王主之八十一字應於陽陽中有隂月宮孝道仙王主之隂陽之後五行生五行生而分五位於是有赤書五老之文五行分矣上下顯之故有三皇内文内文之合而爲三華分而有九章生神之經是也於是則大有金書昔元明文舉天答落大梵四字書三便之門開大有之關通龍漢之眞是也九章具而三才之理分則三而成質有二而成地三而成人其理著矣故曰三華離便大有妙庭此又見其文之所以濟生死保劫運者如是度人之經大體本赤書中篇即以一而生五生成之終始原其相叅以爲用則不可爲易通也求其文元始中篇著於末者取生物首下之義故赤書先之今隨經意明以爲法赤文章第四師曰按赤書玉訣眞文呪說古文後來學者難施用故髙上注筆以解曲滯玉訣眞要開演古文微解玄妙諸天所傳披誦玉音十方遥唱上天設禮神魔降伏而今後世書道法以舊文通之多有謬異世俗尚同溺於先見故文字以先得者爲貴世俗文以常有者爲賤而偶得者爲寳世俗復以難得者爲竒而易得者爲庸謬所以世師有得妙者多不以及人而盲師錯說各立方論遂誤後人今審諦先以仙房叅同務爲簡要直指宗說無疑乃筆爾東方玉篆一百二十字正文在後譯文東方九炁始皇青天碧霞鬱壘中有老人總校圖籙攝炁舉仙歳星輔肝角亢鎭眞氐房心尾四景回旋箕主七辰正斗明輪承炁捕非掃除災群東山神呪攝召九天赤書符命制㑹酆山束魔送鬼所誅無蠲悉詣木宫敢有稽延下制東河溟海水神大劫洪災蛟龍負身水府開道通逕百千上帝赤文風火無間南方玉篆凡一百五十二字正文列在後譯文南方丹天赤書玉堂中有大神號曰赤皇上炎流煙三炁勃光神仙受命應運太陽熒𤊨輔心井鬼守房栁星張翼統御四郷軫總七宿迴轉天常召運促㑹正道驛行赤文命靈北攝酆山束送魔宗斬滅邪根符敎所討明列罪原南山神呪威伏八方群妖滅爽萬試摧亡南河水帝太伯龍王神呪流行普掃不祥洪水非災正蛟召龍開除水逕千道萬通敢有干試攝送火宫赤書所告莫有不從中央玉篆凡一百四十四字正文列在後譯文中央總靈黃上天元始生五老中皇髙尊攝炁監眞總領群仙典籙玄圖宿簡玉文催運上炁普告萬神鎭星輔肝迴度北元魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳勑攝北帝遏塞鬼門剪除不祥莫有當前中山神呪召龍上雲制㑹黃河九水河源不得怠縱善惡悉分千妖萬奸上對帝君莫有干試太陽激燌赤書玉字宣告普聞西方玉篆凢一百三十六字正文在後譯文西方素天白帝七門金靈皓映太華流氛白石峩峩七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙太白檢肺奎婁守魂胃昴畢觜主制七關參總斗魁受符北元赤書玉字九天正文攝召萬炁普歸帝君西山神呪八威七傳符水上龍召山送雲在所校録同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳北方玉篆凢一百二十字正文在後譯文北方玄天五炁徘徊中有黒帝𩀱皇太微總領符命仙鍊八威青裙羽䙱龍文鳳衣上帝所舉制到玉堦北辰輔腎斗牛衞扉女虚危室豁落四開壁總七星執兇紏非却災掃穢明道動暉北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧九河傾訖鳥母群飛蛟龍通道水陌洞開赤文玉書驛龍風馳玉訣章第五師曰凡行赤書安鎭者須先關告而正爾便爲之無所益也須奏章䟽通呈者爲佳今具法式行用以爲一章而五帝䇿文隨經在前八威龍文隨經在後此直述五篇真文事節而已諸以啓願求道投刺等悉先東向叩齒三通如運化章行持記次呪曰無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符各三十六人出關啓此間土地四面眞官臣今正爾燒香關啓入意㫖願得十方正眞之炁入臣身中所啓上聞徑御無上至眞大聖尊神玉帝几前師曰如不用此即邪魔所干不得上達全用五書格師曰凡投簡如告水帝削除罪籍即朱書木簡上以青𥿄𦊷青絲纒之金龍水簡以投三河之淵如告嶽仍用金紐埋本命之嶽告九地土皇則亦如告嶽之式埋於所住中宫於簡上書云具位年若干某月生於水府則云願神願仙長生不死三元同存九府水帝十二河源江海淮澤溟泠大神乞削罪名上聞九天謹詣水府投簡記名金紐示信金龍驛傳五嶽則曰長生度世飛行上清五嶽眞人至神至靈乞削罪籍上名九天謹詣靈山投簡記名金紐示信金龍驛傳九地則曰長生度世飛自上清中皇九地戊巳黃神土府五帝乞削罪録勒名太玄謹詣中宫投簡記名金紐示信金龍驛傳太歳某年某月某日某朔於某處告聞用總監鬼神印印之右簡悉皆背書眞文面書呪文水府呪北向叩齒三通宣簡畢告下召龍天水神内用元始五老赤書髙尊十方至眞太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二河源九府水帝溟泠大神今日上告萬願開陳謹投玉簡乞削罪名千曽萬祖九族種親罪相連染及傳我身普蒙削除絶滅種根記名水府言上帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神鬼咸聞謹以金紐關盟水官請如所陳金馬驛傳嶽府呪東向叩齒九通玄上開明元始監眞上帝五老赤書丹文天地本始總領三元攝炁合㑹催促舉仙髙上符命普告十方日月星宿五嶽靈山天上天下冥靈大神監生主録南上三門開領玉簡勒名丹書削落罪篇土府帝君千曽萬祖九族種親皆蒙解脫五苦八難去離三惡魂昇九天先亡開度萬劫長存今日上告萬神咸聞謹以金紐關盟眞官請如所告金龍驛傅土府呪中庭叩齒十二通安鎭星度切用天開地張九炁分靈三元洞符十方朗清五老上帝開眞領生丹書赤文元始上清普告天下九土皇靈今日上告萬炁定生我願我仙謹投玉名土府太皇勒除罪刑奏簡上宫列簿華清早得飛騰天地同靈九祖種親腐骸更榮魂昇南宫舉化仙庭今日告命萬神咸聽謹以金紐表名至情請如所告金馬驛傳又法凡隱書五方赤書眞文置五方則五嶽仙官至長齋百日精思則天神下降但佩此文亦得尸解朱書五方五色石上災殃自滅凶逆自消凡五嶽不必正嶽只以住居之山分五嶽以命方爲命皆取像以招靈氣嶽之神無不住也凡人一面之上亦有五嶽備焉折用五書訣師曰梵炁開廓出圖度世無文不光無文不立無文不成無文不度無文不生故百魔隱韻離合自然因文以治事因意以立章凡靈書中篇上下二品皆可離合而用並用總監鬼神印投靈山之嶽法呪每遇本命甲子遇立春寫東方赤書自東方起至舉仙住凡二十四字書於九天元臺立夏則寫南方赤書自南方起至太陽住凡三十二字書於九天洞陽之館二分二至則寫中央赤書自中央起至萬神住凡四十字書子太玄玉寳玄臺立秋則寫西方赤書自四方起至上仙住凡四十八字書于九人素靈宫北軒之上立冬則寫北方赤書自比方起至玉階住凡四十字書于玄元紫㣲臺北軒之内天書須依方色書曰剌上記姓名日月如投簡則九年五方仙官到使青腰赤圭黄素大素玉女來皆先叩齒十二通呪曰玄上髙靈元始尊神大聖徘徊萬聖臨軒三景敷暉慶雲四陳上投校圖推筭九天今日啓願投刺靈山丹書赤字自然眞文上告五帝記名玉篇萬神監映日月明言願度願生願神願仙天地星宿互照我身三官九府五嶽大神普告無窮削除罪根元始大開莫不納言九祖幽魂受福自然三途五苦永離八難得與三景同暉紫宸輪轉不滅身得飛仙畢讀刺了投於絶嵓便散香靈山之上又叩齒三通向本命呪曰元始監映仙名已書三官九府罪莫不除散香五帝告監太虚請如所陳萬劫長居安鎭星度天災法呪安鎭五方赤書主召某方星官正天文分度若天災安鎭則隨方而息東方自歳星起寫至災群住凡三十二字以青紙朱書露中庭九日九夜依法以火燒散灰於青煙之中并刻書於青石上埋之南方自熒𤊨起寫至命靈住凡三十六字以青紙朱書露中庭三日三夜依前法燒幷刻書於赤石上埋之中央自鎭星起寫至驛傳住凡四十字以青紙朱書露中庭十二日十二夜依前法燒并刻書於黄石上埋之西方自太白起寫至北元住凡二十四字以青紙朱書露中庭七日七夜依前法燒并刻書於白石上埋之北方自北辰起寫至動暉住凡三十二字以青紙朱書露中庭五日五夜依前法燒并刻於黒石上埋之皆向方面散髮叩齒十二通呪曰元始上天三官髙明迴景照曜四方朗清運度所衝激揚流星三界錯越三綂失寜五斗總是七宿明靈眞君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關迴轉諸天今有客災玄告不祥謹以眞文赤書上呈散髮謝愆披露丹誠惟垂玄監迴復天經炁不橫越災不横生燌燒靈文散煙玉庭上景照監普告萬靈炁消三關災滅九冥隂陽調和國土太平謹以金龍風馳驛呈畢露眞文於中庭以金龍鎭之隨日而化又依方色數用燈照及繒爲信攝召法呪凡受上法冝先攝伏魔鬼魔精旣伏神明自攺東方即自東山寫至稽延住三十二字朱書青木剌書東華玄靈之館南方即自北攝寫至摧亡住三十六字黃書赤木剌書西南陽正玉闕中央即自勑攝寫至當前住十六字白書黄木剌書玄都玉臺西方即自赤書寫至帝君住十六字黒書白木剌書九天金闕三圖之館北方即自北山寫至滅摧住二十四字青書黒木剌書北方洞隂朔凡念呪北向五次東九次南三次中十二次西七次俱叩齒三十六通閉炁九口仰面念呪曰三元開明㢠轉天常運推數終百六上乗大劫交㑹萬妖爭行北鄷不拘放逸鬼宗群魔縱肆妖閉天光上帝有命普告十方演明天度法敎開張正道治民掃除不祥有何小群聚爲傷赤書玉文檢攝鬼郷北鄷三官明速傳行千魔束爽萬鬼送形流鈴交煥激炁太陽金虎四邀天丁捕亡大小齊到不得匿藏元始所告列奏上官召龍天水神止水度等法呪天地大劫之災洪水四出此符可以禳止或使蛟龍爲通路開水逕以度身形東方自下制東河寫至無間止凡三十二字黄書青紙投水中南方自南河寫至不從止凡四十八字中央自中山寫至普聞止凡四十八字西方自西山寫至驛傳止凡四十八字北方自九河寫至風馳止凡二十四字皆如東方叩齒五通閉炁三十五息存身心中生火火出頭頂燒四方山林草木及已身都盡形體都成灰塵一時飛翔入青煙之上無所遺復思大水浩浩蕩蕩除天下已身化成蛟龍隨水而流因又扣齒二十五通呪曰上始廻靈開明九天元推地轉三炁流傳五行相促運度機關隂陽否激結成災衝大劫傾記蕩穢除氛九河受對洪流激川水毋徘徊鳥馬合群日月㝠㑹三景停關上選種臣推校玉文棄惡貴善清水濁分我叅帝簡名列九天大災四㑹赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈光山浮度我身九河水府溟泠大神開除水逕通利河津蛟龍應符攝山送雲負我度我驚回奎張丹書玉字元始眞文金龍驛呈時刻無聞者須奏御上對帝尊畢引炁二十五咽須㬰自當有水神通關道在山則山浮在水則水自開可謂臨急而濟也太上靈寳淨明飛仙度人經法卷三
