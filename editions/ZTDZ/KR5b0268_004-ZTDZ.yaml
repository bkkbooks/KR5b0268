front:
  text: 太上靈寳淨明飛仙度人經法卷四髮四
  hash: sha256:4b67ce74ec1b0edd2a4d3cd25b78f01bf8a68d9bc630d672ca230408535b7023
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_SJB_004-100581c, image: sjb/10/100581c.png}
body:
  text: 髙明大使神功妙濟眞君許旌陽釋龍䇿章第一師曰受學道士佩此靈文施於神呪以䇿文指天則天神下降指地則地祇朝禮三界束帯指神神敬指鬼鬼臧指水水神通道大劫交運洪災四㑹以䇿召龍龍爲護身長修善事精誠通達則神靈交㑹所在施召舉向立到千變萬竒適意所從出入行藏位推太極前道飛龍後從鈞天鳳嘯鸞鳴十二華光建九色之節命靈之旛精思九年天儀自備常朱書三天太上召伏蛟龍虎豹山精文着一板上又書記年月師姓名著一板上合二板内囊裹又朱書次文著一板上凡二板合封爲神䇿如簿之狀板悉用銀木爲之長一尺四寸廣二寸四分以絳紋之繒作囊合長二尺四寸衣之封外又上下封以元始五老之章内板格外板次文洛題内外板文以本師諱字及年月日題之具本貫法位弟子本命年若于謹以某炁天中請到太上靈寳八威䇿文三牒文太上所傳黄帝合封爲䇿以出仰之式右毎用即先告白次念呪呪畢叩齒九通仰天三肅引天炁三咽以䇿之指所告之地閉炁九息而止呪曰元始太眞五靈髙尊太華皓映洞朗八門五老告命無幽不聞上御九天中制鄷山下鎮河海十二水源八威神呪靈䇿玉文召龍負水収炁聚雲束魔送鬼掃蕩妖群萬精搉落所誅無蠲日月五星北斗七元諸天諸地諸水諸山五眞所部溟泠大神仙王遊宴五帝仗旛天丁前驅金虎後奔钁天猛獸羅備四門所呼立到所召立前赤書煥落風火無停有所攝驗金龍驛傳師曰靈圖赤書玉訣龍䇿曰章並略叙赤明開圖至萬範開張一篇所載皆赤書煥發開落爲用以濟合生之一二其有多門未能悉記學者通於一而萬事畢矣宜在乎多如能精專何施不可儻一一求之雖彈紙墨不足以盡爲用多乎哉所謂萬範開張也元綱章第二元綱流演三十二天輪轉無色周廻十方旋斗歴箕廻度五常三十五分總炁上元八景㝠合炁入玄玄玄中太皇上帝髙眞汛景太霞嘯詠洞章金眞朗郁流響雲營玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙千和萬合自然成眞眞中有神長生太君無英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上清出入華房入冥之内細微之中下鎭人身泥丸綘官中理五炁混合百神十轉廻靈萬炁齊仙師曰元綱者昇仙之要路天階之絶景道源旣判神天居空洞之上非言可盡非見可聞悟其眞者因眞修眞而外眞自應矣識其妙者因妙得妙而外妙自應矣推神天之象則元綱之位其逺其近舉可知也人之有元炁開通骨䏞𩨨穴上達於頂一如天上元綱之路人之魂魄在身一如人在天中知出入則長生飛騰不知則庸愚之夫不學術業未知事官聮班之次而求見君也夫元炁融聚魂魄所飬爰有眞精眞精所本根於左腎右腎爲命門在脊骨之窮其下有大骨骨中髓透尻骨其穴多龜尾其神爲王毋面南而治事因帝所向而言謂之西龜之山道家托喻以爲名也又謂之金闕以其居西也右謂爲金闕左爲玉房玉房言其玉在山而木潤居東方也又玉水之所本陽精之化精之所着名曰淨霐此元綱之炁根本所發之地寳圖之設髙壇起於此存三之說鬱羅蕭臺基於此臺之中尊直當於心所謂靈臺此上清之景也太清之上際則心之下也心之懸垂其下爲肝肝之下二分北斗七星居之其炁達心其原上通舌下名曰涌泉其炁下達右腎腎之炁泄者以涌泉之炁不禁爲交鋒交鋒者言斗之罡星大魒所照之地其性肅殺其神即欲界也如知道者以舌柱上腭直運其炁循脊而上以脊通頭頭者上清玉京之要路所謂西龜與玉京爲隣界者是今人不知便以爲西龜在腦者有之然龜去玉清之炁四千萬里則其遼邈可知也心居中炁直達在天則火星最低炁先及也又心屬火命門之炁亦屬火言上達而相感天之日月與火星齊故日月叅之人身則兩乳與心齊兩乳者兩眼之根原也人之二乳藏精以養目也故年老氣敗目昏則乳無根腎無精其斗在天之東北爲天之關鍵艮之位也於人則右手肩井穴也人之炁脉以右爲始天道行以西北爲始由行西而至牛宿而天事畢人之炁自右手肩井至左手而人炁周天事雖畢而未可發生故造化於北起焉言重入火星也人炁雖一周而消息係焉言重入心中也由火木水金而行者天度也由心肝賢肺而行者炁腧背脊之穴也取脊穴而觀則上下左右見矣求其妙而推其喉環通頂門所以爲玄玄之妙妙者言之不能盡不可指而名也無色之界在心之下空洞之處魁之左也後自斗口以舌柱上腭也舌柱上腭者名上天橋則超上清矣如此則玉清之景頭也太清之景丹田也上清之景絳宫也心爲靈臺則靈寳之說可見矣於是而守守之在心於是而朝朝之在頭此三華離便而見大有之庭也故天中之天無英白元之㑹於心也自然成眞則㑹於頭也修上道而至此則事畢矣不可得而容聲也故録爲元罡飛歩之法其有細微出在淨明法中今具罡圖于後師曰元罡之事叅於身中則嘯咏洞章之說以經而論則云玄中太皇至自然成眞住也究其義則玉清之景也玉清者天上之天也仰而視之則無上也俯而窺之則日月五星斗宿之神也三十二天之帝也言㑹而朝髙眞太皇也太皇在洞房中三十二天羅布二十八宿環之日月五星侍立於前峩然大有之庭也以人身而求之天則頭者上天也兩眉間者太皇上帝髙眞所居也汎景太霞者兩目中光也嘯咏洞章鼻口出入息也金眞者鼻應金也流響雲營玉音攝炁者口鼻之息其響韻如此紫虚者眉也輔翼萬仙千和萬合者耳目鼻口不妄爲出入有眞人童子存馬其聲合乎天籟與洞章叅言中正之和氣分以其音召和氣出爲布炁呪水之呪師曰長生太君火之正星玄中太皇之炁也無英公子白元尊神是金木之神星太乙司命是水之尊號桃康合延是土之眞帝以洞房仙法驗之世書之論不同今正本法椎窮得旨要之精者爲洞房法呪水布炁法諸呪水布炁見玄中太皇身著上清衣手執青書坐師子座左有長生大君右有太乙司命亦衣上清衣執圭侍立其大如棗在兩眉間方闊一寸如亭殿金闕照耀有光如青紅瑠璃照水中如布炁則存照病人念呪自玄中太皇起至自然成眞住几九遍存思耳目口鼻中有仙樂洞章歩虚之聲呪水時吹炁於水中九口布炁吹病人亦九口布炁未驗再存吹三次而止洞房修眞法諸修眞洞房者亦存三守一之要法也毎日靜坐不拘時候存玄中太皇身著上清衣手執青圭坐師子上長生大君在左太乙司命在右無英在左白元在右桃康在左桃孩在右長生火也火傳厨不息故爲長生心也太乙命門之神也故爲司命無英肝神白元肺神桃康合延土神物入土則分析而生故其神有二此神居臍中臍爲命之根土爲五行之根今以爲賢神則非也腎水也得土而和故存腎者亦思二桃也存之則次第存自本官出各衣上清金縷霞衣侍衞中尊太皇在眉間分明了然眉中一寸廣如宫殿微呪曰眞中有神至萬炁齊仙住凡八十一徧一徧取炁一口又思已魂衣絳綾衣袍戴逺逰之冠朝見太皇髙尊與太皇髙尊相對坐衆眞侍立如前復念前呪九徧咽津八十一過而止靈芽章第三師曰經自梵炁而分其言包含萬範皆明梵炁分布施生靈秀於是而知赤書之字結爲五芽在天則爲五帝之精在人則爲五官之秀中理五炁者以其下鎭安於一人也故自修洞房行元綱布神炁而服五芽存思食生炁之法服五芽法師曰九炁青天三炁丹天中央黃天七炁素天五炁玄天各有五帝五靈之童東方青靈之童典青帝之書諱開陽長九寸青羽衣執青麾侍文左南方赤靈之童典赤帝之書諱丹珠長三寸赤羽衣執赤節侍文前中央黄靈之童典黄帝之書諱紅瑛長一寸二分黄羽衣執黄鉞侍文中央西方白靈之童典白帝之書諱明石長七寸素羽衣執白旗侍文右北方黒靈之童典黒帝之書諱玉滋長五寸黒羽衣執黒幢侍文後學者思此五童降巳身百日及佩眞文百日其神居五藏之中爲致五芽之精常以立春之日雞鳴入室東向九拜平坐叩齒九通思青帝字靈威長九寸冠青玉冠衣九炁青羽飛衣駕蒼龍玉輿建鴞旗從甲乙始老之官九十萬人來降須㬰化生青炁如雲貫覆巳形從巳口直入下肝腑又思木星煥明在東方照已身便開目念呪九遍吞東方眞文十二字又常以立夏日雞鳴入室幸向三拜平坐叩齒三通思赤帝字飄弩長二寸冠赤玉冠衣三炁丹羽飛衣駕丹龍王輿建釆旗從丙丁眞老之官三十萬人來降須㬰化生赤炁如火貫䨱已形從己口入直下心腑又思火星煥明在南方照已身便開目念呪三遍吞南方眞文十二字又常以二分二至四日雞鳴入室向王十二拜平坐叩齒十二通思黃帝字含樞紐長一尺二寸冠黄玉冠衣五色羽衣駕黃龍玉輿建黃旗從戊已元老之官十二萬人來降須㬰化生黄炁如雲覆巳身從已口入直下脾腑又思土星在天中照我身便開目念呪十二遍吞中央眞文十六字常以立秋日雞鳴入室西向七拜平坐叩齒七通思白帝字曜魄寳長七寸冠白玉冠衣七炁白羽飛衣駕白龍玉輿建素旗從庚辛皇老之官七十萬人來降須㬰化生白炁如雲貫覆已身從已口入直下肺腑又思金星煥明在西方照已身便開目念呪七遍吞西方眞文十二字又常以立冬日雞鳴入室北向五拜平坐叩齒五通思黒帝字隱侯局長五寸冠玄玉冠衣五炁玄羽飛衣駕黒龍玉輿建皂旗從壬癸玄老之官五十萬人來降須㬰化生黒炁如流星之光貫覆已形從巳口入直下賢腑又思水星煥明北方照履已身便開目念呪五通吞北方眞文十二字東方呪曰九炁青天元始上精皇老尊神衣服羽青役御天官煥明歳星散輝流芳陶溉我形上餐明霞服引木精固養青芽保鎭朽齡肝腑充溢玉芝自生𢌞年億劫色及童嬰五炁和合天地長并南方呪曰三炁丹天朱宫靈童元始上老叅駕赤龍丹羽飛衣錦被明光驅䇿靈官運導隂陽三炁吐輝漑我絳宫赤子但鎭錬芽飾容朝餐朱景玉芝滿充𢌞停劫年朽骸反童長齡天地水享無窮身生水火斷絶群兇中央呪曰中黃太山元炁徘徊上有皇老總綂四垂參駕黃龍五色羽衣運導九天輪轉璇璣煥明七星流光散輝玉英芳芝充溢四飛陶漑我身脾臃先開養芽餐精萬神總歸檢魂制魄仙錬八威表裏洞明長生不哀通眞達靈升入玄微西方呪曰金靈七門皓映西華中有素皇元始之家參駕白龍七炁峩峩徘徊玉門散精朱霞金星吐輝芳芝𩃎𩃱玄奥我身飬我素芽明石鮮光萬劫不俱服以流泉餐以太和九天上帝給以玉華保年駐顔白景敷羅長存天地三光同遐北方呪曰北方玄天五炁散靈上有大神始老元精駕龍建旗逰宴上京是日元吉慶雲敷榮飛芝流灑滂沱四盈玉女玄奥溉我身形腎宫𠑽鎭朽芽重生五府納眞上通神明五老降接仙道早成變化水火衣服羽青飛行太空逰造紫庭壽同三景萬劫遐齡右呪畢各依方數咽津止便服字諸常服字則以雞鳴陽光始分東向叩齒如其方數摩兩掌拭面目如其方數念呪自東方起至北方終爲一周東方青芽云服食青芽飲以朝華畢便以舌撩上齒之裏舐唇三過令玉泉滿口而咽之三過又引青炁九咽令鎭肝中南方朱丹云服食朱丹飲以池華以舌撩下齒表䑛唇漱口今玉芝滿口而三咽之又引赤炁三咽令鎭心中中央戊己昻昻太山服食精氣飲以醴泉畢以舌撩上齒取玉泉舐唇而三咽之又引黃炁十二咽令鎭脾中西方明石云服食明石飲以靈液畢以舌撩上齒漱口令玉芝滿口而三咽之又引白炁七咽令鎭肺中北方玄滋云服食玄滋飲以玉飴畢以舌撩下齒内䑛唇漱口滿而咽之又引黒炁五咽令鎭賢中右畢叩齒三十六通咽炁二十五過止又都呪曰白石巖巖以次行源泉通湧洞灌以玉漿飲之長生壽命益長畢以舌撩口上下中央令玉芝滿口而三咽之其道都畢東方眞文南方眞文中央眞文西方眞文北方眞文玉飴仁濟章第四仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因縁普受開度死魂生身身得受生上聞諸天諸天之上各有生門中有空洞謡歌之音魔王靈篇辭叅髙眞師曰此唾易修摩也其神常集於泥九之上在人頭常爲人呼集魂魄眞神有淪喪數未盡者皆救其名爲法倧兄弟三人手執飛天法輪此是三天魔王之子也其靈篇之辭在後詳其義而爲之洞章而唾易修摩符出淨明經也本章今别以爲救世符禁之術第一欲界飛空之音人道渺渺仙道莽莽鬼道樂兮當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶師曰此歌音可以斷百邪凡人家素有妖魅未欲驅捉只令自北分散不爲禍患則以此音治之搯酉文念呪七遍書符一道鎭之其怪永絶符文右件以五月五日造印之如有患狐魅即令帯之其鬼自去髙上清靈爽悲歌朗太空唯願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人筭斷絶人命門阿人歌洞章以攝北羅鄷東送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆師曰此歌音可以驅捉邪魅凡人家有精怪作禍遣之不去者以此音掐酉朱書眞字一通付所差官將擒之其文先以引劄叙事用此粘連卷前或粘投詞前如有印文即掐訣印粘之眞文玉篆第二色界魔王章落落髙張明炁四騫梵行諸天周廻十方無量大神皆由我身師曰此歌音可以禳鎭凡人家宅不寜所謀不遂身命迍蹇可以用朱書符貼佩書時念此呪七遍又左手辰文符文我有洞章萬徧成仙仙道貴度鬼道相連天地眇莾穢炁氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩師曰此歌音可以解拔𡨚滯飛疰復連凡有此者以桐木書符念七遍手掐巽取東方炁一口吹之書畢却以再書寫此一叚於其上四畔發出用朱書亦可佩帯令人和合所向如心也符文右書訖以字蓋之置於門上若解塚訟則釘墓側龍漢蕩蕩何能别眞我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故爲歌音師曰此歌音可以治顚邪凡心病不知所主者以此呪符五徧取午炁一口書符令患吞佩左右午文符文第三無色界魔王歌曰三界之上眇眇大羅上無色根雲層峩峩唯有元始浩劫之家部制我界統乗玄都有過我界身入玉虚我位上王匡御衆魔師曰此歌音可以佩帯百神稽首公私災患不及書符即用此呪之左手寅文呪三徧取東西二方炁各一口書訖朱寫文封之一邊寫一邊押字符文空中萬變穢炁紛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復柰何師曰此歌音乃遣鬼呪也凡有祖先爲禍不可攝罪者以此音呪符一道燒之書符時再掐酉文符文此三界之上飛空之中魔王之音音叅洞章誦之百遍名度南宫誦之千徧魔王保迎萬徧道備飛昇太空過度三界位登仙公有聞靈音魔王敬形師曰此歌音眞書以封前所燒之符封符如簡上書此文勑制地祇侍衞送迎拔出地戸五苦八難七祖昇仙永離鬼官魂度朱陵受錬更生師曰此章可以救沉滯凡有幽魂則先燒遣鬼呪符次焚符追度之時其文當寫如歴關諸天關子叙事意凡爲弟子追度則同歴關諸天同爲之以黃紙墨寫符文符文太上靈寳淨明飛仙度人經法卷四
