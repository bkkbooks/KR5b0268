front:
  text: 太上靈寳淨明飛仙度人經法目録髪一
  hash: sha256:87ed79533fdf69bab2408558e5d69d5464f8f6650a2d1a68b0736a706a52ff27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_HFL_000-001a, image: hfl/0316/0316-004.png}
body:
  text: 卷一叙微是初學入事訣法下手行功并十戒三等受職啓運章付祕傳口訣行功看法文上開龍漢劫三十二天書五老赤字傳念碧落空歌書符眞應章道君受法之初見衆眞皆㑹此時中令弟子看法文未開時㝠目定觀閉息良久念元始天尊當說是經至師子上住識神章師曰此靈寳一切法中行事之神冝逐日燒香朝禮行待法具于后昭應章此道君受法之初有此昭應用說經十遍一叚爲普召十方眞文有金書玉篆之字書於法圖中經内有訣法另有召神呪可看洞界章天尊傳法了見弟子法身中有此變化用呪呪黍米隱身存神拘魂制魄之術另有存思呪訣在内可看爲用護身章見弟子得法行功恐有宿業一切鬼神奸人䛏賊欲來害者行三歩丁罡法令弟子照此行持以護身一切鬼神奸人不能害傳受章師於此戒諭弟子此法尊妙德難可勝經中所言並是諸天上帝内名隱韻之音亦是魔王内諱百靈之隱名非世上人間之常辭與善因緑行之萬災不干爲萬道之宗說戒科目章師曰此法行功有薦拔祖考超出幽夜之苦於此演說十戒制燒草人劵以追億劫種親此篇中又有七事至用明功中大畧七事令弟子授戒付職給牒在此職品章法師於此敎行歷關諸天普告三界元始符命等文再叮嚀弟子知此經功不小此是上士行之以至飛昇又有三等加職存思章行功到此有存思呪法凡日行只依此念本章以爲崇修之功德永作定制卷二叙經開化章師見弟子得傳行功三年身中靈圖有顯現出元始祖炁化生諸天開明三景是爲天根上無復祖唯道爲身今爲佩服行持法化生章此章叙前章見五文開廓現出五老五帝赤文五芽玉字出示於人有靈書之炁化爲赤書赤書化爲文物凡書符存思念上文之爲呪建立章見祖炁化生諸天内有玉清之境在中爲天中之天又顯三境於此存思以爲日用之法有三華離便符書于三丹田中度世章大行梵炁周廻十方顯中有度人不死之神等五帝又名五老衆聖臨軒見有此景是無上眞空不壞不滅長生神仙之化身保生章到此己見神功法身造化傾光回駕衆眞執符把録齊到帝前隨所應用以救人之生死劫劫長存普告章天尊於此岀三界眞文立篆符以度弟子億劫種親超出幽戸作普告三界劵符命章天尊出元始符命符篆金書以超生度死今爲弟子度無量億劫種親削滅惡籍證入仙宗以爲大仙立劵章顯法圖中有三十二天之聖化立法昇天劵弟子得法行功日功於此考驗聖功日生惡業日消化身在此出今天尊作爲昇天劵符眞文度弟子自身并億劫種親昇天製劵章天尊於此立劵法符文四方三十二天金書玉篆眞文并劵式合同劵符超出幽戸歷關諸天章天尊於此立諸天眞符關告諸天斬滅三惡根一能爲延年益壽一能爲去病除禍一能爲超度先祖卷三運化章師於此示普告無窮之主領天地之中四方鬼神聽命奉行法事隱化章師於經中釋出元洞玉曆天地未判本無形影因大梵之炁立始生玉曆是罡炁生今授法拘制隨罡歩而隱復命歸根以爲存思隱身呪呪行自然隱也靈圖章師於此明出中篇内混沌之後始制文字前功所說化生赤書赤書非功夫造化之文是浩劫之初今天尊示敎赤明開圖於玉皇本行經中以爲法今聖師編入本用始全飛仙之道赤文章此章接赤書玉訣眞文呪說古文後來學者難施用今出玉訣眞要開演古文元始中篇雖有文物化生無制伏之法止有四方按三十二天靈書玉字妙體自然其炁分出於九梵其開明玉訣八威龍文威制九天羣魔始伏丄天設禮神魔才於眞文玉篆之内授制以比相叅以爲法玉訣章師於此出敎凡行赤書眞文先須關告安鎭五嶽奏章䟽通呈者爲佳便爲之無所益故今出關告奏章法式行用作一章今學者於此悟行持玉帝䇿女隨經在前八威龍文隨經在後直述五篇於于后以爲用五方赤書眞文有二用全用五書内有袐訣行移式一告水府一告土府一告嶽府拆用五書一投靈山之嶽按八節甲子本命日書一攝召法行先攝伏魔精一安鎭星度以禳天災一召龍天水神止水法卷四龍䇿章師於此授學道之士佩此靈文施於神呪長修善事精誠通逹則神靈交㑹所在施召舉向立到千變萬竒任意所從出入行藏位推太極今有法式明白在此元綱章師於此明元綱者昇仙之要路天階之絶景明敎人知元綱即元炁人得法行功元炁逆而上行開通一身骨脉筋絡人受元炁而生生成人體一身上下皆屬隂只有這物是陽精人不識故於此一一明指變化神靈令學者遵而行之再有洞房修眞法在此靈芽章師於此明開前章得萬範開張化生赤書玉字結爲玉芽五芽之化在天則爲五帝之精在人則爲五官之秀中理五炁故自修洞房行元綱布炁而服五芽以爲修煉之法服五芽法五方呪王方眞文仁濟章師於此知受學道之士得法行功知身中無量之地能度人上開八門有飛天法輪人身注定罪福禁戒是宿命因縁今次普受開度身又得受生諸天之上各有生門中有空洞謡歌之音及魔王靈篇故今將靈篇之辭在後今學士詳其義而爲之另有按摩符出淨明經也本章今别以爲救世之符禁制之術此分出三界符文眞篆第一欲界有斷百邪符眞文玉篆治精怪作禍第二色界有三道一道鎭家宅不寧一道解復連𡨚滯一道鎭顚邪第三無色界有符二道一道禳公私災患一道是遣鬼符祖先爲三界之上飛空之中魔王之音此符一道簡上書此符歷關諸天内亦用卷五袐藏章師曰此敎弟子知聖功不小是上天袐寳今換手下功以爲法文呪著例章師於此明著二章一章明天地運度一章明天地運終此二章並是諸天上帝及至靈魔王之隱袐之音非世上之常辭故謂玄奧難可尋詳上天所寳袐於玄都紫微上宫依科四萬劫一傳要擇至人告盟十天然後可付不可輕傳内音章師曰此明元始靈書中篇内有三十二天隱韻之音於此顯修眞之士功効有赤明開圖現眞空不壞化身出圖又現五文開廓皆是大梵之炁凝結却用天書玉篆眞文應身應玄譜要度九祖億劫種親立法名昇天劵上分四方毎方八天正文元始中篇指敎隱名有能以黄繒爲地書其眞文佩帶身應玄譜九祖昇天成仙也下士無德勿以輕傳玉字章師曰靈書玉字妙體自然其炁分出於九梵其開明見於後所以取之者有義别之者有體服之者皆以炁之所受其用度在於意義玉字眞文出昇天劵眞符章師於此出書二十五符文服字章師於此集出終歳之用字體方向月日令學道之士勤玩味讀不爲造次之間乎兼以行持服芽守中各有日子則一歳之間不過數日今雖示敎是凢間字様眞書眞文天篆於昇天劵中照此字理而取用之字訣章師於此章明出制字之因皆梵炁開明隨其所冝而受持今逐一開明于此計二百五十六字出自靈書中篇自然章師曰道之微妙大無不包小無不遺或以文縱横倒置或離或散無不當其用元始中篇玉字出乎大梵之炁分之而爲字合之而爲聲妙之而爲符𥿀之而爲呪則有飛篆散殊之體皆因經言所以濟用今編入以爲法復命章師於此破盡此經中微奥微妙法前編法敎中間盡是諸天隱語無量音此音字并文人人雖有萬箇中無一人能知此音字聖師故於北再三說破此諸天中大梵隱語無量之音有能知其音字便是生天生地生人生物之道本知音便知道知道便知自身中性命知性命故知有造化造化在以經中方全修鍊之功釋例自然玉字章師於此明破先天祖炁一投爲人身只言大梵之炁敎人以有形數發自然之和闡自然之妙立修煉有爲之妙法超出於混沌之初岀於希夷之表聖人以文運化文以聖立敎以是而出法依形數而名出自玄關明三便皆以制形數而定期運則所謂炁者道之全體道之敷落其精華顯古聖人敎觀天文以察時變觀地理以察山勢所謂文者非今所爲而有始制文字此一句爲人不可不明莫將爲世俗之常論若人知此一句可逃生死不入輪廻今出敎文字兩事編二章此章箄明文理文者皆昔同傳聖意垂言音與人省一念失科流浪輪轉今巳生爲人誠能知身之貴道之難文之妙而明之可謂靈炁回元宫眞人歸舊隱者也凡修眞學道者於此篇中留心細詳甚有妙處味之味之自然眞理章師於此篇明字之出處字者炁所結也符者字之精也呪者字之理也含者字之音也以丹染紙字之與符托此而形容也原夫字者岀手大梵之炁有萬一之化真理有三用焉吾今開明萬一三用萬一者天地人物蠢動含靈一切有形有數皆不離萬一之造化造化有三用大抵總而言之乃大梵之炁遂有清濁之分清者爲天濁者爲地中和之炁爲人天一字地二字中者爲人三字也人之形體而後於此一爲凡夫省事入濁穢之炁中俱不明此身是萬一上修來上件聖傳妙法文字皆不能明於此出處多有得遇此經亦不明此理法皆是聖意隱音義理上求㝠㝠於幽暗之中度日又如夢中人皓首不遇此經亦不能明上件聖傳止度得宿有善根肯信之人本乎爲人合明此文字推道理修身而全終天年之壽是本等道路有等凡夫濁子遇道人談道大笑詳之非怪不由他他本受人形爲人無道炁所養累劫至今止結得畜生業縁故所以大笑文字體中所生無有汝等靜看度人經中一篇無文不光無文不明無文不立無文不成無文不度無文不生九天生神章而無此文九戸閉塞體不生神則胞胎結滯死炁固根眞景不守生炁無津徒受一形又有一等肯信法之人宿有善縁今世又受父母之清炁仍習善念好道敬天地重神明勤香火還不離舊性雖被宿業𡨚親障㪍朦昩若遇磨鏡之師㸃化一言而便信又有一等自小齋戒男女不願婚配一念修行者亦不由他此子身中有三元宫中宿有金名紫字刻書來生應爲三清神仙之人當應此文有此數等之縁㑹故上聖垂此法敎留傳隱語隱音文字顯發造化修真之義理由是而推萬範陶冶孰不出乎大梵者哉原人之有生則有道有道則有法聖於此立神於此行道於此興神因此而成聖故顯道法以化人道因人而有明道則出字文爲敎敎設而道著道成而敎神矣非天下之至神至精其孰能與於此若非累劫之薰修豈得見聞此敎誠哉是言也自然成眞章師於此釋出自然成眞眞理自然二字釋之無盡非世人常俗之言聽其自然是爲此事不及便開言說聽其自然世俗之人不知此二字出處吾今明汝等省自然是汝天性之小名未有此幻身先有此名故稱自然自然是天生汝等爲人是他來投胎他是汝歷劫生身親父毋他能注汝一生衣禄貧賤壽夭冨貴行藏悉由他生以爲此人已有此主主張故呌名聽其自然諸事由他今安修行又要尋見識得他他又能生汝爲神仙運隂陽降魔皆憑此主人公以此經萬卷不離此二字爲頭今汝修行見他他便作自然而然學而第一聖師於此明天地人物一切有形皆憑道生道生是自然自然生成爲人法名大梵之炁炁能運行若只言自然不能見運行生化之理大梵二字又不可輕易而言釋氏門中稱梵言爲西番畨人之言非也人身中有七寳華林自然王人投胎爲人他在七寳林中安身立命爲凡夫故將此理稱大梵之炁能生萬物前二章先明始制文字生産之源岀處了此一章單明大梵之炁修行人得法制起大梵之炁返本還元一身梵炁周流與大天地中日月運行同貫穿五臟六腑九竅四肢變化成眞大率飛仙度人寳法無他箄明自然成眞之用故能變化飛昇作天仙經後有備悉變化之用可照又明與大衆省自然二字世之人口頭常不離此二字但凡見人扭捏巧爲一件事後不成便說天生自然端正扭捏自然歪斜可將此語詳之便省此二字不小可只是做一箇凡夫不省只憑說得出便了太上靈寳淨明飛仙度人經法目録
