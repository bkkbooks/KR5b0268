front:
  text: 太上靈寳淨明飛仙度人經法卷五髪五
  hash: sha256:a75d8a430bfb382a8293f848a48e3f061f0fc15e39eeff14368510caf3ad4836
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_HFL_005-001a, image: hfl/0317/0317-052.png}
body:
  text: 髙明大使神功妙濟眞君許旌陽釋祕藏章第一是謂無量普度無窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁師曰此是元始說經不可輕易皆上天祕寳泄慢則招禍故神仙學道以祕之今爲収法文呪凡収祕文則以左手恰午勒入向下念此呪則其法通靈所在神護鎭宅安家也著例章第二道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奥難可㝷詳上天所寳祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寳質心依舊格告盟十天然後而付焉道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同炁皆當齊心修齋六時行香十徧轉經福德立降消諸不祥無量之文普度無窮道言夫末學道淺或仙品未𠑽運應滅度身經太隂臨過之時同學至人爲其行香誦經十過以度尸形如法魂神逕上南宫隨其學功計日而得更生轉輪不滅便得神仙道言夫天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度隂陽不調亦當修齋行香誦經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當修齋行香誦經夫齋戒誦經功德甚重上消天災保鎭帝王下禳毒害以度兆民生死受頼其福難勝故曰無量普度天人道言凡有是經能爲天地帝主兆民行是功德有災之日發心修齋燒香誦經十過皆諸天記名萬神侍衞右别至人剋得爲聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也師曰此是元始說經明其有經者可以行事每件舉而用則表奏狀牒皆云凖經格言遵奉天尊誨約推而行之不敢别立外意今録一件以爲式謂如爲同學滅度誦經修齋則其辭文云凖經格道言至便得神仙右某伏爲甲乙云云諸天中大梵隱語無量音内音章第三元始靈書中篇東方八天亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻荅落大梵散煙慶雲飛灑玉都明魔上門無行上首回蹠流玄阿陁龍羅四象吁員南方八天南閻洞浮玉眸詵詵梵形落空九靈推前澤各菩臺緑羅大千眇莾九醜韶遥縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫西方八天刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辨阿那品首無量扶蓋浮羅合神玉誕長桑栢空度仙北方八天玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇炁合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自眞元梵恢漠幽寂度人師曰天書玉字凝飛玄之炁啓運數之期八㑹而成音五合而成章煥乎諸天曜於太幽與龍漢赤明而倶化錬水火於五行之終含金木於五行之始兆開三景分判二儀立五嶽超生死而振潜伏者自然之文也如能以每月初三日初五日初九十五二十五日各清齋誦詠龜山丹皇飛玄紫文以次而思存誦詠則當名書九天魔王保舉九玄七祖皆被福䕃誦詠之妙法詳矣今再取其便而易行使當思詠而不忘者著于後東方常當叩齒九通思九色之龍居左青雲九重覆匝身形宻呪曰赤明開圖九炁廻眞總綂玄關青帝大神流化九外纒綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上昇帝轅畢引炁九咽止南方常當叩齒三通存朱雀鳳凰翔于前絳雲三重覆匝身形呪曰三炁徘徊靈鳳來飛玉音八字煥爛紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空歩虚足躡丹梯周旋八天七祖相隨畢引炁三咽止西方常當叩齒七通存白虎師子居右素雲七重覆匝身形宻呪曰七炁金靈八天尊神白虎䇿輦獅子捧轅七炁纒綿煉我成仙身發金光映明素靈内外變化昇入金門七祖出夜九幽開魂三塗五長斬惡根同灌福舍受慶自然億劫開度隨運長存畢引炁七咽止北方常當叩齒五通思羽蓋玄式從于後玄雲五重覆匝身形呪曰元天徘徊流景上清大道啓運八字開明飛天澄空洞音日生五炁纒綿灌我身形冠帶北單今日受煉洞靈腎府内外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寳林中反胎更形長夜出離南宫紀名黄籙白簡削死上生畢引炁五咽止師曰有能以黄繒爲地書其眞文佩帶而常存念前章則身應玄譜九祖昇仙其佩文之法已見於昇天劵矣今有服字等法叙于後爲玉字章玉字章第四師曰靈書玉字妙體自然其炁分出於九梵其開明見於後所以取之者有義别之者有體是以服之者皆其炁之所受養之以和而致仙録爰自炁出爲字字散爲符離合出於玄微㫖義本於深奥天眞皇人記之以爲上篆道君天尊合之以爲歌音王母譯之以授漢武自漢武之後譯而爲道體飛篆今載於靈寳法者皆西王母所以示漢武之音字也若夫用之以爲篆符延生保命救治弭災則必取諸舊本吾今以舊本叅於仙房者得其妙㫖而明之其字其符其服食之日月其用度之意義庶㡬有補於髙人玉字眞文出昇天劵中此不復叙眞符章第五東方南方中央西方北方右符爲他人則用符自服則服字訣節各隨方取炁用之服字章第六師曰凡學道之士務在得其㫖得其義得其叙何謂得其㫖見而不迷用而有應信而行之何謂得其義所本不誤求而有理通而悟之何謂得其叙所用有倫簡而不繁安而習之則自然有成况有如玉之姿如金之志勤玩味讀不爲造次之間乎今因其日月集爲終歳之用而服字之功畢矣兼以行遣修持服茅守中各有日子則一歳之間不過數日兼以行之其初學壯行致君澤民事親治家本之以行而佐之以功輔之以神明其超脫不可勝計哉本命日服九計二十八字明首同本本飛灑向本命無行向本命九靈推前向太歳澤洛菩臺向南神纓自宫向太歳婆泥向本命易邈無寂向本命阿那品首向本命正月旦日服七計一十九字霐向本命無量向東玃無向東自育九日向東龍漢瑛鮮向東惡弈向壬元梵恢漠向東每月初三日服二計四字流羅向月建陀羅向月建每月十五日三十日服二計六字薈無月終向日宛首少都十五日向月每月弦望日服二計六字無惒觀音向日緑羅向日八節日服十六計五十三字阿弈向北華都曲麗向王阿陀龍羅向王育邈向王韶謡向天門雲上九都向玉京九層之臺那育郁馥向王馥朗廓弈向王滌色向王梵萌向西北九開自辯向王眇炁合雲向王總監上天向王碧落浮黎三時向王空歌保珍正中向王羅合神向王立冬日服三計八字摩羅向東北幽寂度人向北九醜向東北冬至日服一計二字流玄向北立夏日服一計二字流羅向北夏至日服一計二字運容向北立春日服三計七字梵形落空向東持向東咎通向東北春分日服一計二字眇莽向東立秋日服一計二字鮮菩向西秋分日服一計二字菩曇向王甲子日服三計一十字法攬向北坤母東覆向北形攝上玄佩向北戊辰戊戍日服三計二十字須延向西北忽訶流冷向西北荅落大梵向西北庚申甲申日服一計二字玉都向西北五月五日服七計二十二字刀魔向南四象向北南閻洞浮向南緣遭向王飛生自騫向南無鏡攬姿向南刀利禪猷向南七月七日服十四計四十七字稼那向王上門向本命吁貟向南玉眸詵詵向太歳縁遭向王飛生自騫向南法輪向本命無鏡攬姿向南刀利禪猷西向太渺之堂向南扶蓋浮向北子時飛天大醜向本命沙陀劫量向壬無品洞妙自眞向南九月九日服六計一十八字欔無向東恰卯自育九日向東恰辰龍漢瑛鮮向西恰本師訣惡弈向王恰午元梵恢漠向東恰午導乾向西北恰寅太歳日服五計一十二字慶雲向南恰離回蹠向太歳恰乾大千向太歳恰中指中宛藪向東恰卯景蔚蕭嵎向本命恰生辰行年日服一計二字上首向地戸恰坤日日誦經時服三計一十字郁竺向東恰艮玉誕長桑栢空向正恰寅度仙雞鳴時服恰寅有惡夢時服一計四字華莫延由向東恰艮每月十齋日服四計九字亶婁阿向王恰本師訣育臻向王恰生炁散煙向本命恰本命阿繿向北恰子自本命日起至此計二百七十七字字訣章第七師曰梵炁開明各因所出而制字隨所冝而受持或削名於死籍而注南昌或明妙法之宗而求玄奥莫不遂其所欲大哉自然之化離合叅同散殊無方義歸一體譬之江河昭然可考也亶婁阿出於玄都長樓之上主以正天地之度萬神朝已恰本師訣薈無出於南軒之上主空無之中自然成眞服之神貟平生恰寅惒觀音書日月之門主開長夜之身有光明面有金色生死受度恰日君訣須延出於天西北玉闕主天地劫數服之得隨運生死位齊飛天恰乾明首出於天三界之門主始開之分度服之地官削死三界保仙恰乾法攬出於紫微上館主罪福之塲服之三官削死罪簿消名恰子菩曇出於北元玄斗之中主服之則玄斗記名佩之則九幽罷對恰本師訣稼那出於金華之上宫主生死圖録服之則九府削罪玄都記生恰午阿弈出於玉京七寳玄臺主萬仙朝禮之儀服之神眞來朝已形生死逍遥恰紫庭忽訶題九靈之館主天地大期服之能愈大疾恰戍流吟出於北元玄關主天地之炁服之凡大災皆過度恰辰華都曲麗出於太極上宫青華之闕主衆眞玉女誦詠服之玉女遊戲其房向王恰生炁鮮菩出於洞元之臺主天慶㑹存白雲白日面有玉光神仙變通恰春寅育臻出於洞靈上館主御帝君遊觀八極制天魔王服之則生死同昇遊觀八極恰生炁荅落大梵出於三便之門主天元數之炁開大有之關通龍漢之眞服之生死皆度消陽九百六之災恰乾散煙出融生之臺是南極上元之遊臺主眞人玉女服之玉女下降恰本命慶雲出紫陽館主靈風之炁起慶雲之輪服之生玉光有自然之香恰離飛灑出玄都玉闕主飛天開大有之光服之生死皆與飛天齊功不經地獄恰乾玉都出紫微臺主開九幽長夜之魂服之七祖皆仙上登朱陵恰乾明魔出北靈館主開八書於空洞制萬魔於帝庭服之召集群靈攝伏百魅恰離上門出北極主生死善惡服之百日北帝削死録南宫上生籍生死受仙恰本命無行出元始玄臺主天地開閉服之制身神運生死恰本命上首出北上玄闕之門主運度之炁服之制神炁精與運生死長居南宫恰坤回蹠出天門主玉篇眞文隱明之運開生死之期服之五臓出光萬神並煉生死成仙恰乾流玄出九夜之臺主死魂歸靈受生還人服之九祖皆離幽夜上昇南宫恰坤阿陀龍羅出龍山九折之河主帝君遊觀俯仰之儀服之帝君下降上眞來迎恰旺方生炁四象出北斗玄臺主死生命籍服之北斗削落死籍度生南宫恰子吁員出南斗長生宫主死魂度入南宫制受煉之神服之南斗拔取神魂受煉更主體入自然恰子南閻洞浮出洞陽之館主受煉之因服之身神澄正内外光明恰本命玉眸說詵出南極上宫主受煉之名服之五内結仙項生圓象恰寅梵形落空出玉京山玄臺主天兀開運服之萬神具形變化群方恰寅九靈推前出南極上元宫主生死功過服之南宫開生放九幽長夜之魂恰寅凙𠗂菩臺出天西南龍澤主開明日月服之得過陽九之災恰離緑羅出日月上館主三光分度服之身有光明生死不滯恰辰大千出玄關之上主四方無極分度之期服之得周旋無極世界不拘五苦之難恰中指中莽出紫微上宫主天文開明服之得度朱陵受號爲仙恰寅九醜出北帝寒靈之窓主魔精服之萬鬼潜伏恰艮韶謡出三便之門主雲中謡歌之鬼服之萬魔降伏恰卯縁邅出南北二斗之門主生死功過服之北斗削咎南斗書仙恰王生炁雲上九都出玉京九層之臺主飛天眞人朝眞之禮服之成仙恰本命生炁飛生自騫出洞陽上館主諸學者受度之品服之則魂神受鍊恰寅那出天關之上主四時之炁服之形神安災障不干恰生炁育郁馥出玄關之中主衆眞朝宴之儀服之萬神朝禮恰生炁摩羅出金闕北壁主學者應度制伏天魔服之萬魔伏降恰艮法輪出三便之門主應度之人服之名上南宫九祖受鍊恰本命生炁霐出紫微之宫主領萬神服之萬神侍衞威制十方恰寅持出東華宫主制神龍典儀服之神龍爲使恰辰無鏡攬姿出三便之門主生死圖録服之北帝削死三界度仙恰寅運容出南宫主五炁鍊度儀典服之面有玉光萬神安鎭恰離馥朗廓弈出玉京山七寳臺主諸天眞人遊行服之修齋衆眞下降恰中指中神纓自宫出太微上館主洗鍊神舍服之百靈混合身體光明已身常居絳府恰離刀利禪猷出南極玄窓之上主得道之人受鍊品目服之身胃納律萬靈鎭體恰婆泥出南極洞陽之館主得道之人受鍊加進仙品服之三官削咎南極登名恰離咎通出南上北窻主制萬魔服之鬼精滅爽神眞總歸身飛太清恰艮宛藪書金闕主諸塵穢之炁服之萬穢蕩清恰卯滌色出眞房主諸飛仙道人服之蕩穢清神祥光自生恰寅大眇之堂出南宫福堂主品秩服之九靈記福生死受天厨恰寅流羅出月宫主天王遊宴服之面貌有光金容玉質恰日君梵萌出玄都紫房主天地劫㑹服之過陽九之災恰乾景蔚蕭嵎出玉京玄臺主生死録服之三官除罪籍南宫記仙名恰生辰易邈無寂出未陵之闕主生死開度服之蒙解釋九幽削愆恰寅宛首少都出日宫主得度之人服之則日童下降面生光彩㓕度則受錬恰日君阿繿出玄都長樓王兆天中之魔服之萬邪不干眞靈即降恰子郁竺出三便之門主制天中之魔服之心神澄正誦詠朗徹上天遥唱恰艮華莫延由出北靈上館主治萬鬼之牢服之群魔束形精怪自滅三宫明檢鬼營恰艮九開自辯書玉闕九天之上主四時之炁服之四時俱生旺不患時疾恰寅阿那品首出明眞之堂主滅度之籍服之九幽録福及先恰寅無量出紫微北軒之上主得道者昇品服之東華記名恰寅扶蓋浮出南陽之臺主校幽録服之北都削對南宫記名九祖超度恰乾羅合神書大羅始陽之臺主上品之人得度服之九祖超脫身得神仙恰乾玉誕長桑栢空書東華青林之樹主天中自然之音服之聲叅太極炁入神宵恰寅度仙出玄都玉臺主眞人服御服之面有玉光九祖同慶恰寅玃無出玄都長臺之上主天地開閉自然之眞服之則隨輪運轉不失本形恰卯自育九日出神樓之上主天地劫㑹服之滅度得受太和之炁而入眞恰辰導乾亦出主一同服之與九祖同昇恰寅坤母出扶桑司靈館并東覆出東井華林並主洪水四出盈縮之度服之水行不傷神龍護度恰子形攝上玄出太極宫中主大水佩之亦可止水朱書佩恰子陀羅出月上之館主明天地之隂陽服之身有光明照見五内恰月君育邈出三便之門主死生之籍服之則度大災㑹位爲仙王恰本生炁眇炁合雲出紫㣲雲宫主生死服之生死得詣朱陵恰生炁飛天出玉臺之上主空洞自然服之身與四時節候相應誦經上達恰本師訣大醜出三便之門主生死圖録服之生死得道魔王保舉恰本師所屬總監上天出紫微長樓主總監諸天之炁服之七祖昇超恰寅沙陀劫量出紫微上宫主功德事服之三界書其功上朱陵之府恰生炁龍漢瑛鮮出玄斗之中主度得道之身服之九幽之魂昇之無極恰本師訣碧落浮黎出玉清雲宫主衆眞之儀服之萬神朝已恰中指中空歌保珍出紫微上宫主自歌音服之則能知諸天之音也恰酉惡弈出紫微太虚之館主度得仙之人服之朱宫書名飛天同功恰午無品洞妙自眞出南陽上宫紫軒主勲服之識前身生死超度恰午元梵恢漠出玉清上宫太極之臺主虚無自然生眞識知微之㡬服之則慧智恰午幽寂度人出北闕玄牝之戸主六府受眞體生光明服之則上遊大羅恰乾自然章第八師曰道之爲妙大無不包小無或遺以文縱橫倒直或離或散無不當其用元始中篇玉字出乎大梵之炁分之而爲字合之而爲聲妙之而爲符約之而爲呪於西漢靈寳之書則有飛篆散殊之體皆因經言所以濟用吾今飛仙度人之法本於舊載叅於仙房以增以除以證靈寳之法貫通不遺今略取靈寳一二所載以辨其爲同一者五帝大魔本以薦幽滯而靈寳則爲破壇伐廟治狂邪武勇之神可召而任以護助微劣法子流浪之義二者東方八天本以四篇皆爲昇天劵而靈寳止取一天者取東方生炁也三者南方八天本止可以祈晴於至陽之地而靈寳又以祈雨用之又以持字爲使龍之符也四者華莫延由本治惡夢而靈寳取以止盗鬼賊與之爲性一也五者形攝上玄本禁水之符也而靈寳取以止怪獸與水怪皆隂類也六者總監上天本主炁之字也而靈寳取以止怪飬子難以貼於堂奥來生炁也凡六者皆靈寳法與度人有異處求其離合之自然則一也復命章第九道言此諸天中大梵隱語無量之音舊文字皆廣長一丈天眞皇人昔書其文以爲正音有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勲魔王保舉上仙道備尅得遊行三界昇入金門師曰此乃本經叙書所出之因也如能觀此而悟則勉而不忘也此音無所不辟無所不禳無所不度無所不成天眞自然之音也故誦之致飛天下觀上帝遥唱萬神朝禮三界侍軒群妖束首鬼精自亡琳琅振響十方肅清河海靜黙山嶽吞煙萬靈振伏招集群仙天無氛穢地無妖塵㝠慧洞清大量玄玄也師曰此乃誦洞章法也夫存思之道貴乎絶念誠知天中自然之音能使飛天下觀則必以眞而應則不妄觀唯知琳琅振響而誦詠味之十方肅清無外濁也河海靜黙無妄動也山嶽吞煙無妄泄也萬靈振伏無妄害也招集群仙無妄專也如此則大地性心廓然而已所以能㝠慧洞清大量玄玄也太上靈寳淨明飛仙度人經法卷五
