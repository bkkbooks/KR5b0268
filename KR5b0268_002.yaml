  text: 太上靈寶淨明飛仙度人經法卷二髮二
  hash: sha256:b5f0230b4b7726e5a17f6a0a284ae34152e1c5f5fb1b085d057ce798ce3c34f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0268_HFL_002-001a, image: hfl/0316/0316-072.png}
body:
  text: 髙明大使神功妙濟真君許旌陽釋叙經言其道有常也使後之達者因耀觀釋明例釋例二卷以象地合三十二章以成三十二天叙經四卷以象四睛開化章第一元始洞玄靈寶本章上品妙首十回度人百魔隱韻離合自然混沌赤文無無上真元始祖氣化生諸天開明三景是為天根上無復祖唯道為身仙師曰此是元始說本章中篇是祖氣之先巳有此氣變結成文遂有赤書及二篇靈書之符淨明寶圖為化生之根本今書元始靈書中篇佩服行持救人治病於未誦洞章存神以前先默念上文畢續云某今日欣慶㑹入事書北玉字伏願天恩開度心拜訖存思如法法事具載本章化生章第二五文開廓普植神靈無文不光無文不明無文不立無文不成無文不度無文不生是為大梵師曰此是說經叙述中篇及二品靈書之氣化為赤書赤書之氣化為文物今書五老赤書五芽玉字凡書符未召神存思之前先念上文續云今日慶㑹入事伏願天恩開度建立章第三天中之天鬱羅蕭臺玉山上京上極無上大羅玉清渺渺劫仭若亡若存三華離便大有妙庭金闕玉房森羅淨霐師曰此是說玉字之氣化生諸天而玉清之境在中為天中之天鬱羅蕭臺者玉清天寶又重而靈寶神寶三丈人之氣在空懸之中不見可聞若亡若存三華者氣分為三金闕玉房森羅淨霐氣變而有形也今人分大梵祖氣以有其身當與天地合故上文為存思三氣之法師曰行飛仙度人之道者當以本命太歲其夜亥時漏水下七刻入室朝真再拜靜坐存思己身丹田下有池皆金玉砌岸上有金闕玉房樓臺三層太上老君在下層太上道君在中層元始天尊在上層其臺直向頂門而三君所坐正當丹田絳宫泥九三處有三色雲氣毫光自泥丸出叩齒九通呪曰天中之天至森羅淨霐止搯都監訣書三華符各一道第一符第二符第三符右吞一道符存入丹田有紅氣上透泥丸吞第二道符存入丹田有紅氣上透絳宫吞第三道符存入丹田有紅氣與前二氣升降交合凡九次成青黃白三氣衝頂門作祥雲如車蓋乃微祝曰金房之內有三君變化大梵生寶璘正氣真精入玄玄結成瓊臺體自然巍巍凌空髙三層流霞丹霄翼瓊田上通稜層九重天下有萬丈幽谷泉合會洞門造靈根三華寶耀生明鮮呪畢咽氣九口止度世章第四大行梵氣周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生轉君文人中有南上司命司録延壽益算度厄尊神回骸起死無量度人今日校録諸天臨軒師曰此言元始化生之初發揮大梵彌羅十方分氣流光以有衆聖救度無量今為發符呪凡救治申發章奏追度安鎮悉遣飛天神王隨方而往凡用淨明須存思呪內衆真及六師臨軒方遣將念呪自大行梵氣至諸天臨軒呪時面東恰卯文吸五方五色氣五口發揮時放訣噓氣一口出五色東方無極飛天神王長生大聖無量度人南方無極飛天神王長生大聖無量度人西方無極飛天神王長生大聖無量度人北方無極飛天神王長生大聖無量度人東北方無極飛天神王長生大聖無量度人東南方無極飛天神王長生大聖無量度人西南方無極飛天神王長生大聖無量度人西北方無極飛天神王長生大聖無量度人上方無極飛天神王長生大聖無量度人下方無極飛天神王長生大聖無量度人十方至真飛天神王長生度世無量大神並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈幡前嘯九鳳齊唱後吹入鸞同鳴獅子白鶴嘯歌雍雍五老啓途群仙翼轅億乘萬騎浮空而來師曰此言遣神王行事存思也初天尊遣神王下度億劫萬品之時其儀衛如此今法師治事用關牒如常儀分明書事因隨方所遣之如上方則關告上天下方則關告九地不歷四方者用之凡所遣關引上以朱書神王真篆於其差役處以淨明法主印印之仍書淨明怛他蘇伽功曹符凡行用亦須照此作兩行書之保生章弟五傾光廽駕監真度生諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天師曰此言靈寶大法天真大神聖衆㑹集於上帝之前救度生死今裂以為求嗣續之法吞符書日字時口念鬱儀取太陽氣從左目出書月字時口念結璘取太隂氣從右目出二氣交合如後法佩符書明字左日七縛右月七殺存日月紅黃光交合入符中取東方氣一口西方氣二口發出念呪搯訣如要男以手自寅左轉至巳出要女以手自申右轉至巳上出夫婦相望夫面西婦面東以清水日吞一道百日內有子吞符燒入水中服之佩符亦用前呪呪之書符白素朱書男左女右帶之普告章第六普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群師曰此言靈寶天尊道君說經可以超度生死今為真文靈符為弟子億劫種親超出幽戶作普告三界劵普告三界符文太歲年月日下上清靈寶大法師名銜書時用真文並中中㫖下節普告三界符右用桐木板長九寸濶三寸二分朱書黃地貼簡上太玄都省印印之符命章弟七元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遙上清師曰此言靈寶天尊說經此可以超生度死今為弟子量億劫種親削滅惡籍證入仙宗作元始符命文元始符命真文太歲年月日告下位職元始符命符書符同真文並搯中指中右用柏木或桐木板長九寸闊三寸二分朱書青紙符命真文貼於簡上符下用太玄都省印印之立劵章第八上清之天天帝玉真無色之境梵行東方八天太皇黃曽天帝鬱監玉明太明玉完天帝須阿那田清明何童天帝元育齊京玄胎平育天帝劉度內鮮元明文舉天帝醜法輪上明七曜摩夷天帝恬懀延虛無越衡天帝正定光太極濛翳天帝曲育九昌南方八天赤明和陽天帝理禁上真玄明恭華天帝空謡醜音耀明宗飄天帝重光明竺落皇笳天帝摩夷妙辨虛明堂曜天帝阿𨚧婁生觀明端靖天帝鬱密羅千玄明恭慶天帝龍羅菩提太煥極瑶天帝宛黎無延西方八天元載孔升天帝開真定光太安皇崖天帝婆婁阿貪顯定極風天帝招真童始皇孝芒天帝薩羅婁王太皇翁重浮容天帝閔巴狂無思江由天帝明梵光上揲阮樂天帝勃勃監無極曇誓天帝飄弩穹隆北方八天皓庭霄度天帝慧覺昏淵通元洞天帝梵行觀生太文翰寵妙成天帝那育醜瑛太素秀樂禁上天帝龍羅覺長太虛無上常容天帝總監鬼神太釋玉隆騰勝天帝眇眇行元龍變梵度天帝運上玄玄太極平育奕天帝大擇法門三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人師曰此是三十二天上帝魔王內諱有能知其靈音者魔王保舉升仙故今為弟子同身及先代億劫種親給付升天劵必自東方八天訖默念至欣慶受度封劵畢再拜以道君玉印印之製劵章第九凡補弟子及為弟子追薦祖光並給劵文男為左劵女為右劵佩帶以黃絹朱書之各髙九寸長三尺二寸每月用兩本書升天符合同於上男留左女留右其一本燒隨家藏天樞門下照應其一本與之佩帶追度則一本燒付亡人一本送天樞為合契書劵之法於天門上坐面對巽方搯上清訣存身為道君默祝事因畢念魔王歌章依式寫中篇真文魔王歌章曰梵行冠太羅淳風抗玄紀無形有常存觀世翻然理屢踐不終劫探幽度生死三乘通便路清虛無塵滓長夜對一魂地獄五苦解劒樹不搖條刀山不傷體門有浩劫翁地無夭年豫今日慶斯㑹諸天並歡喜不勝情欣悅髙唱稽首禮念歌章畢吸氣三十二口存太黃皇曽天帝自東北方揖四方天帝皆至部領玉童玉女直符吏衆手執丹筆候看書劵同為保明弟子九祖六親拔出地戶以成大仙如式染丹書劵劵式書劵內五符及燒劵並戴日履斗如淨明法口傳心授東搯寅南巳西申北亥劵文書畢以道君玉印印之念净明靈書二篇封劵用二劵合書此符男留左太上靈寶淨明院女留右追度亦同此式凖淨明祕典升入仙宫忠孝之子福及其親九世蒙秩受命仙升靈章下處諸天送迎今補弟子某充某職須至給卷照㑹如追度即云追度弟子光靈付天樞院受職者天禽地獸族玉文即元始靈書中篇靈書中篇即升天劵東方八天譯文亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽阿流吟華都曲麗鮮菩育臻答落大梵散煙慶雲飛灑玉都明魔上門無行上首回跖流玄阿陀龍羅四象吁貟十六句計六十四字南方八天譯文南閻洞浮玉牟詵詵梵形落空九靈推前澤𠗂菩曇緑羅大千眇莽九醜韶遙緣邅雲上九都飛生自騫那育郁馥摩羅法輪持無鏡攬姿運容馥朗廓奕神纓自宫計一十六句該六十四字西方八天譯文刀利禪猷婆泥咎通宛數滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿育竺華莫延由九開自辨阿那品首無量抹篕浮羅合神星誕長桑柏空度仙計一十六句共六十四字北方八天譯文玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漠幽寂度人計一十六句該六十四字右給付弟子某甲收執佩帶以後五苦咸解三途並原長滅惡根南宫上生劫劫受度與天齊年急急如律令太嵗某年某月某日某朔告下具職度師九州都仙太史髙明大使至道玄應神功妙濟真君監度師三天扶教輔元大法天師正一冲玄神化顯佑真君籍師玄都御史真君經師至孝恭順仙王祖師太隂元君孝道仙王靈寶淨明黃素天尊祖師太陽上帝孝道明王靈寶淨明天尊太皇黃曽天尊歷關章第八歷關諸天請滅某人三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈青帝護魂白帝侍魄赤帝飬氣黑帝通血黃帝中主萬神無越青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天檐力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥入威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛呈師曰此元始天尊所說之經一能為延年益算一能為去病除禍一能超度先祖凡為弟子行事皆書其文歷關諸天凡行關告若為弟子延年益算自歷關諸天至總監衆靈再自神公受命至金馬驛傳右為弟子除病去禍自歷關諸天至無拘天門再自青帝護魂至萬神無越又自神公受命至金馬驛呈若為弟子追度先祖自歷關諸天至無拘天門再自青天魔王至金馬驛呈書關畢用泰玄都省印印之內延年治病非章醮不可輕用歷關諸天真文關式太上靈寶淨明院今謹據弟子某甲伏為入意延年治病云追度先祖云須至關告者凖淨明祕典升入仙宫忠孝之子福及其親九世蒙秩受命仙升關告到處諸天奉行今𥙷弟子某充某職須至關告者右歷關諸天朱書四字請滅弟子追度即開九祖先親等三惡斬絶地根至金馬驛呈太歲某年某月某日關具職師曰關文用青紙朱書年月日用淨明法主印印之如為人延年治病又須給五斗五帝符東斗主算符卯文西斗記名符酉文北斗落死符子文南斗上生符午文中斗大魁符中中右五符書時依方取氣掐訣念呪存想五斗真君在五方自北方書至中央土放訣或佩或燒師曰北斗七元君大聖善通靈為吾脫死籍黑編無姓名令吾得長壽特飲沆瀣精飛仙得逍遙無量大度人師曰東斗生氣府天中至尊神為吾注遐算遂與天地並令吾得長壽特賜日華精飛仙得逍遙無量大度人師曰南斗朱明宫丹霞至陽神為吾上生籙瑶記何文明令吾得長壽特受丹池精飛仙得逍遙無量大度人師曰西斗太素景素天至光明為吾紀仙譜不遭邪魅侵肅殺無所及特與月華精飛仙得逍遙無量大度人師曰中央黃庭宫大魁至責精為吾監衆靈衛護不死身令吾得長壽特與隂陽精飛仙得逍遙無量大度人青帝符卯文青帝青龍將軍九千萬人青兵騎吏九億萬衆輔仁㝎義赤帝符午文赤帝朱雀將軍八千萬人赤兵騎吏八萬億衆輔禮定智白帝符酉文白帝白虎將軍六千萬人白兵騎吏六億萬衆輔義定禮黑帝符子文黑帝玄武將軍五千萬人黑兵騎吏五億萬衆輔智定信黃帝符中中黃帝麟鳳將軍三千萬人黃兵騎吏三億萬衆輔信定仁巳上五符書時先存五帝在五方念呪青帝護魂白帝侍魄赤帝養氣黑帝通血黃帝中主萬神無越次依方搯訣書亦可自佩服然歷關諸天則併前說延年為之復有行持兼神䇿法青帝符東向叩齒九通思青氣從口入注肝中生九重青華寶光徹映頂中書符置前呪曰無上青精九氣大靈神光遐散流映東青華景鬱勃觀我身形宫府安鎮寶魄自生洞達八朗飛升玉庭畢引氣九咽止服一佩一若置杖則一納其中赤帝符南向叩齒三通思赤氣從口入注心中生三重丹華寶光徹映胸前書符置前呪曰丹華流映寶芝生光神精徹幽散靈八方直符攝氣嘯命朱童三精敷煥注我絳宫赤神安鎮五香溢充洞映形外表裏發光身生水火獨步飛行畢引氣三咽止一服一佩若置杖則一納其中黃帝符向王叩齒十二通思黃氣從口入注脾中生十二重黃華寶光洞映一身書符置前呪曰總元髙靈回神四鄉黃上散華五帝交芳流精散漫十二重光混合我形萬神相迎安脾養氣中房保齡度脫億劫永鎮無窮畢引氣十二口止服一佩一若置杖則一納其中白帝符向西叩齒七通思白氣從口入注肺中生七重素華寶光洞映丹田書符置前呪曰金靈七氣素華流芬金精童子首建元巾帶符攝氣萬神㑹門寶光奕奕照我命根安鎮脾華萬劫長存畢引氣七咽止服一佩一若置杖則一納其中黑帝符向北叩齒五通思黑氣從口入注腎中生五重玄華寶光洞映背外書符置前呪曰北上太玄五氣徘徊寶華五重流光煥輝靈景鬱秀洞映太微仰注我身腎府鮮開安鎮靈宅萬神總歸身生羽服舉形自飛畢引氣五咽止服一佩一若置杖則一納其中置神䇿杖法取向陽之竹長七尺七寸有七節者作神䇿杖使上下通直甘竹為佳書黑帝符安下第二節中次白帝符安第三節中次黃帝符安第四節中次赤帝符安第五節中次青帝符安第六節中空上一節通天下一節立地蠟封上節節中實以元始之章即靈書中篇也又封下節節中實以五帝之章即五老赤書也皆黃素綘文作室長短大小足容杖卧息坐起當以自隨行住可脫衣蓋竹隱以出入或不以隨身當别安潔處無失之也受持既久以杖指天天神設禮指地地祇侍迎指東北方萬鬼束形凡乘杖行住及欲施為當叩齒三十六通思五帝直符吏各一身隨方色衣服有五色之光流映杖上五帝玉女各一人共衛杖左右微呪曰太陽之山元始上精開天張地甘竹通靈直符守吏部衛神兵五色流煥朱火金鈴輔翼上真出幽入明召天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威利百方與我俱戍與我俱生萬劫之後以代我形置我五解神升上清承符告命靡不敢聽急急如律令畢引五方氣二十五口咽止右本命八節日當燒香左右朝拜行此九年精謹無失神真形見于杖則載人空行若欲尸解以杖代形倐忽之間巳成真矣太上靈寶淨明飛仙度人經法卷二
